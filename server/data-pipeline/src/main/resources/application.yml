server:
  port: 10122

spring:
  application:
    name: data-pipeline
  profiles:
    active: dev

# ClickHouse Configuration
clickhouse:
  url: jdbc:clickhouse://localhost:8123/meta_web_analytics
  username: default
  password: ""
  socket-timeout: 300000
  max-execution-time: 300

# Kafka Configuration
kafka:
  bootstrap-servers: localhost:9092
  consumer:
    group-id: data-pipeline-group
    auto-offset-reset: earliest
    key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
  producer:
    key-serializer: org.apache.kafka.common.serialization.StringSerializer
    value-serializer: org.apache.kafka.common.serialization.StringSerializer
    acks: all
    retries: 3

# RocketMQ Configuration
rocketmq:
  name-server: localhost:9876
  producer:
    group: data-pipeline-producer-group
  consumer:
    group: data-pipeline-consumer-group

# ETL Configuration
etl:
  batch:
    size: 100
    interval: 5000
  topics:
    order: meta-web-order-events
    inventory: meta-web-inventory-events
    user-behavior: meta-web-user-behavior-events

# Logging
logging:
  level:
    com.metaweb.datasource.pipeline: DEBUG
    org.springframework.kafka: INFO
    org.apache.rocketmq: INFO

---
spring:
  config:
    activate:
      on-profile: dev
    import:
      - optional:classpath:application-common.yml
      - optional:classpath:application-common-dev.yml

---
spring:
  config:
    activate:
      on-profile: prod
    import:
      - optional:classpath:application-common.yml
      - optional:classpath:application-common-prod.yml
