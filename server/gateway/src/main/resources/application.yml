server:
  port: 10081
spring:
  application:
    name: gateway
  datasource:
    hikari:
      maximum-pool-size: 2
      minimum-idle: 0
  profiles:
    active: dev
  quartz:
    auto-startup: false
    job-store-type: memory
    jdbc:
      initialize-schema: never
  cloud:
    gateway:
      server:
        webflux:
          discovery:
            locator:
              enabled: true # Enable discovery locator proxy
              lower-case-service-id: true
    zookeeper:
      discovery:
        register: false
        instance-id: ${spring.application.name}:${server.port}
  main:
    web-application-type: reactive
gateway:
  auth:
    authorization-header: Authorization
    token-prefix: "Bearer "
    protected-path-prefix: /
    excluded-path-patterns:
      # User — login/register
      - /user-service/user/signIn
      - /user-service/user/signInWithWallet
      - /user-service/user/create
      - /user-service/user/checkWeb3SignerMessage
      - /user-service/user/checkBitcoinSignature
      - /user-service/user/checkOAuth1
      # Passkey — login steps (register needs auth)
      - /user-service/user/passkey/login/options
      - /user-service/user/passkey/login/verify
      # SSO — login/register/public ops
      - /user-service/sso/login
      - /user-service/sso/loginByPhone
      - /user-service/sso/register
      - /user-service/sso/getAuthCode
      - /user-service/sso/updatePassword
      - /user-service/sso/refreshToken
      # Admin — login + refresh
      - /user-service/admin/login
      - /user-service/admin/refreshToken
      # Flash Sale — consumer-facing
      - /promotion-service/flash/current/**
      - /promotion-service/flash/product/**
      # Actuator
      - /actuator/**
      # WebSocket - digital twin real-time communication
      - /ws/digital-twin
    excluded-path-keywords:
      - /v3/api-docs
      - /swagger-ui
    rbac-excluded-path-patterns:
      # Login & registration — skip role check even if user is authenticated
      - /user-service/user/signIn
      - /user-service/user/signInWithWallet
      - /user-service/user/create
      - /user-service/sso/**
      # Actuator & docs
      - /actuator/**
      - /v3/api-docs
      - /swagger-ui
      # WebSocket — real-time communication
      - /ws/**
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tagsSorter: alpha
    operationsSorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: "all"
      paths-to-match: "/**"
      packages-to-scan: "com.metawebthree"

# Resilience4j 熔断与降级配置
resilience4j:
  circuitbreaker:
    instances:
      backend:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        waitDurationInOpenState: 5s
        failureRateThreshold: 50
        slowCallRateThreshold: 100
        slowCallDurationThreshold: 2s
      productService:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 3
        permittedNumberOfCallsInHalfOpenState: 2
        waitDurationInOpenState: 10s
        failureRateThreshold: 40
      orderService:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 3
        permittedNumberOfCallsInHalfOpenState: 2
        waitDurationInOpenState: 10s
        failureRateThreshold: 40
      paymentService:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 3
        permittedNumberOfCallsInHalfOpenState: 2
        waitDurationInOpenState: 10s
        failureRateThreshold: 50
  timelimiter:
    instances:
      backend:
        timeoutDuration: 3s
        cancelRunningFuture: true

# Dubbo configuration
dubbo:
  application:
    name: gateway
  protocol:
    port: 20881
---
spring:
  config:
    activate:
      on-profile: dev
    import:
      # - optional:classpath:/config/application-common-${spring.profiles.active}.yml
      - optional:classpath:application-common.yml
      - optional:classpath:application-common-dev.yml
---
spring:
  config:
    activate:
      on-profile: prod
    import:
      - optional:classpath:application-common.yml
      - optional:classpath:application-common-prod.yml
