server:
  port: 10081
spring:
  application:
    name: gateway
  datasource:
    hikari:
      maximum-pool-size: 2
      minimum-idle: 0
  profiles:
    active: dev
  quartz:
    auto-startup: false
    job-store-type: memory
    jdbc:
      initialize-schema: never
  cloud:
    gateway:
      server:
        webflux:
          discovery:
            locator:
              enabled: true # Enable discovery locator proxy
              lower-case-service-id: true
    zookeeper:
      discovery:
        enabled: true
        register: false
        metadata:
          version: 1.0.0
        prefer-ip-address: true
        instance-id: ${spring.application.name}:${server.port}
        service-name: ${spring.application.name}
  main:
    web-application-type: reactive
gateway:
  auth:
    authorization-header: Authorization
    token-prefix: "Bearer "
    protected-path-prefix: /
    excluded-path-patterns:
      # User — login/register
      - /user-service/user/signIn
      - /user-service/user/signInWithWallet
      - /user-service/user/create
      - /user-service/user/checkWeb3SignerMessage
      - /user-service/user/checkBitcoinSignature
      - /user-service/user/checkOAuth1
      # Passkey — login steps (register needs auth)
      - /user-service/user/passkey/login/options
      - /user-service/user/passkey/login/verify
      # SSO — login/register/public ops
      - /user-service/sso/login
      - /user-service/sso/loginByPhone
      - /user-service/sso/register
      - /user-service/sso/getAuthCode
      - /user-service/sso/updatePassword
      - /user-service/sso/refreshToken
      # Admin — login only
      - /user-service/admin/login
      # Actuator
      - /actuator/**
    excluded-path-keywords:
      - /v3/api-docs
      - /swagger-ui
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tagsSorter: alpha
    operationsSorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: 'all'
      paths-to-match: '/**'
      packages-to-scan: 'com.metawebthree'
---
spring:
  config:
    activate:
      on-profile: dev
    import:
      # - optional:classpath:/config/application-common-${spring.profiles.active}.yml
      - optional:classpath:application-common.yml
      - optional:classpath:application-common-dev.yml
---
spring:
  config:
    activate:
      on-profile: prod
    import:
      - optional:classpath:application-common.yml
      - optional:classpath:application-common-prod.yml
