server:
  port: 10081
spring:
  application:
    name: gateway
  datasource:
    hikari:
      maximum-pool-size: 2
      minimum-idle: 0
  profiles:
    active: ${PROFILE:dev}
  quartz:
    auto-startup: false
    job-store-type: memory
    jdbc:
      initialize-schema: never
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true # Enable discovery locator proxy
          lower-case-service-id: true
  main:
    web-application-type: reactive
  
# SkyWalking Agent Configuration
skywalking:
  agent:
    service_name: ${spring.application.name}
    collecter_backend_service: localhost:11800
    agent_log_path: ./logs/skywalking
    sample_n_per_3_secs: -1
    agent_package_path: org.apache.skywalking.apm.plugin
    log_report_path: ./logs/skywalking/logs
    cause_exception_depth: 5
    flush_interval: 10
    sampling_rate: 10000
    agent_instance_name: ${skywalking.agent.service_name}-instance
    agent_namespace: default
    ignore_suffix: .jpg,.jpeg,.js,.css,.png,.bmp,.gif,.ico,.mp3,.mp4,.html,.svg
gateway:
  auth:
    authorization-header: Authorization
    token-prefix: "Bearer "
    protected-path-prefix: /
  api-key:
    header-key: X-API-Key
    header-secret: X-API-Secret
    enabled: true
    signature-enabled: true
    protected-paths:
      - /api/open/
      - /developer/api/
      - /open-api/
    public-paths:
      - /developer/register
      - /developer/docs
      - /oauth/authorize
      - /oauth/token
      - /actuator/health
  excluded-path-patterns:
      # User — login/register
      - /user-service/user/signIn
      - /user-service/user/signInWithWallet
      - /user-service/user/create
      - /user-service/user/checkWeb3SignerMessage
      - /user-service/user/checkBitcoinSignature
      - /user-service/user/checkOAuth1
      # Passkey — login steps (register needs auth)
      - /user-service/user/passkey/login/options
      - /user-service/user/passkey/login/verify
      # SSO — login/register/public ops
      - /user-service/sso/login
      - /user-service/sso/loginByPhone
      - /user-service/sso/register
      - /user-service/sso/getAuthCode
      - /user-service/sso/updatePassword
      - /user-service/sso/refreshToken
      # Admin — login + refresh
      - /user-service/admin/login
      - /user-service/admin/refreshToken
      # Flash Sale — consumer-facing
      - /promotion-service/flash/current/**
      - /promotion-service/flash/product/**
      # Actuator
      - /actuator/**
      # WebSocket - digital twin real-time communication
      - /ws/digital-twin
  excluded-path-keywords:
    - /v3/api-docs
    - /swagger-ui
  rbac-excluded-path-patterns:
    # Login & registration — skip role check even if user is authenticated
    - /user-service/user/signIn
    - /user-service/user/signInWithWallet
    - /user-service/user/create
    - /user-service/sso/**
    # Actuator & docs
    - /actuator/**
    - /v3/api-docs
    - /swagger-ui
    # WebSocket — real-time communication
    - /ws/**
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tagsSorter: alpha
    operationsSorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: "all"
      paths-to-match: "/**"
      packages-to-scan: "com.metawebthree"

# Resilience4j 熔断与降级配置

resilience4j:
  circuitbreaker:
    instances:
      backend:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        waitDurationInOpenState: 5s
        failureRateThreshold: 50
        slowCallRateThreshold: 100
        slowCallDurationThreshold: 2s
      productService:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 3
        permittedNumberOfCallsInHalfOpenState: 2
        waitDurationInOpenState: 10s
        failureRateThreshold: 40
      orderService:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 3
        permittedNumberOfCallsInHalfOpenState: 2
        waitDurationInOpenState: 10s
        failureRateThreshold: 40
      paymentService:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 3
        permittedNumberOfCallsInHalfOpenState: 2
        waitDurationInOpenState: 10s
        failureRateThreshold: 50
      userService:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 3
        permittedNumberOfCallsInHalfOpenState: 2
        waitDurationInOpenState: 10s
        failureRateThreshold: 40
      inventoryService:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 3
        permittedNumberOfCallsInHalfOpenState: 2
        waitDurationInOpenState: 10s
        failureRateThreshold: 40
  timelimiter:
    instances:
      backend:
        timeoutDuration: 3s
        cancelRunningFuture: true
      productService:
        timeoutDuration: 2s
        cancelRunningFuture: true
      orderService:
        timeoutDuration: 3s
        cancelRunningFuture: true
      paymentService:
        timeoutDuration: 5s
        cancelRunningFuture: true
  retry:
    instances:
      backend:
        maxAttempts: 3
        waitDuration: 1s
        exponentialBackoffMultiplier: 2
        retryExceptions:
          - org.springframework.web.client.HttpServerErrorException
          - java.util.concurrent.TimeoutException
          - java.io.IOException
      productService:
        maxAttempts: 2
        waitDuration: 500ms
        exponentialBackoffMultiplier: 1.5
        retryExceptions:
          - org.springframework.web.client.HttpServerErrorException
          - java.util.concurrent.TimeoutException
      orderService:
        maxAttempts: 3
        waitDuration: 1s
        exponentialBackoffMultiplier: 2
        retryExceptions:
          - org.springframework.web.client.HttpServerErrorException
          - java.util.concurrent.TimeoutException
          - java.io.IOException
  ratelimiter:
    instances:
      backend:
        limitForPeriod: 100
        limitRefreshPeriod: 1s
        timeoutDuration: 0
      productService:
        limitForPeriod: 50
        limitRefreshPeriod: 1s
        timeoutDuration: 0
      orderService:
        limitForPeriod: 30
        limitRefreshPeriod: 1s
        timeoutDuration: 0
      paymentService:
        limitForPeriod: 20
        limitRefreshPeriod: 1s
        timeoutDuration: 0
  bulkhead:
    instances:
      backend:
        maxConcurrentCalls: 50
        maxWaitDuration: 10ms
      productService:
        maxConcurrentCalls: 30
        maxWaitDuration: 10ms
      orderService:
        maxConcurrentCalls: 20
        maxWaitDuration: 10ms
      paymentService:
        maxConcurrentCalls: 10
        maxWaitDuration: 10ms

# Dubbo configuration
dubbo:
  application:
    name: gateway
  protocol:
    port: 20881
---
spring:
  config:
    activate:
      on-profile: dev
    import:
      # - optional:classpath:/config/application-common-${spring.profiles.active}.yml
      - optional:classpath:application-common.yml
      - optional:classpath:application-common-dev.yml
---
spring:
  config:
    activate:
      on-profile: prod
    import:
      - optional:classpath:application-common.yml
      - optional:classpath:application-common-prod.yml
