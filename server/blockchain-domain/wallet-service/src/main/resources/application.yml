server:
  port: 10114
spring:
  application:
    name: wallet-service
  profiles:
    active: dev
blockchain:
  evm:
    rpc-url: ${EVM_RPC_URL:https://mainnet.infura.io/v3/YOUR_PROJECT_ID}
    chain-id: ${EVM_CHAIN_ID:1}
  solana:
    rpc-url: ${SOLANA_RPC_URL:https://api.mainnet-beta.solana.com}
---
spring:
  config:
    activate:
      on-profile: dev
    import:
      - optional:classpath:application-common.yml
      - optional:classpath:application-common-dev.yml
---
spring:
  config:
    activate:
      on-profile: prod
    import:
      - optional:classpath:application-common.yml
      - optional:classpath:application-common-prod.yml
