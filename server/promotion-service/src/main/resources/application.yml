server:
  port: 10090
spring:
  application:
    name: promotion-service
  profiles:
    active: dev
  datasource:
    hikari:
      maximum-pool-size: 2
      minimum-idle: 0
  quartz:
    auto-startup: false
    job-store-type: memory
    jdbc:
      initialize-schema: never
dubbo:
  application:
    name: promotion-service
  protocol:
    port: 20090
promotion:
  coupon:
    retry-limit: 5
    max-generate-count: 1000
    code-length: 10
    code-alphabet: ABCDEFGHJKLMNPQRSTUVWXYZ23456789
---
spring:
  config:
    activate:
      on-profile: dev
    import:
      - optional:classpath:application-common.yml
      - optional:classpath:application-common-dev.yml
---
spring:
  config:
    activate:
      on-profile: prod
    import:
      - optional:classpath:application-common.yml
      - optional:classpath:application-common-prod.yml
