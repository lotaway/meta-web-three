spring:
  profiles:
    active: dev
  cloud:
    zookeeper:
      connect-string: localhost:2181
      discovery:
        enabled: true
        metadata:
          version: 1.0.0
        # root: /meta-web-three
  datasource:
    driver-class-name: org.postgresql.Driver
  management:
    endpoints:
      web:
        exposure:
          include: health,info,metrics,prometheus,loggers,threaddump,heapdump,env
    endpoint:
      health:
        show-details: always
      metrics:
        enabled: true
      prometheus:
        enabled: true
    # quartz:
    # #如果需要quartz 第一次运行时自动生成 quartz 所需的表那么 quartzJob? 后面的配置为 ：allowMultiQueries=true&useUnicode=true&characterEncoding=UTF-8&useSSL=false&serverTimezone=Asia/Shanghai
    #   url: jdbc:mysql://localhost:3306/quartzJob?allowMultiQueries=true&useUnicode=true&characterEncoding=UTF-8&useSSL=false&serverTimezone=Asia/Shanghai
    #   username: admin
    #   password: 123123
  data:
    redis:
      host: redis
      port: 6379
      database: 0
      lettuce:
        pool:
          max-active: 50
          max-idle: 10
          min-idle: 5
          max-wait: 3000ms
      cluster:
        enabled: false
        nodes: 
  quartz:
    job-store-type: JDBC
    auto-startup: true
    startup-delay: 0
    overwrite-existing-jobs: true
    properties:
      org:
        quartz:
          scheduler:
            instanceName: MetaWebThreeScheduler
          jobStore:
            isClustered: true
            instanceId: AUTO
            class: org.springframework.scheduling.quartz.LocalDataSourceJobStore
            driverDelegateClass: org.quartz.impl.jdbcjobstore.StdJDBCDelegate
          threadPool:
            class: org.quartz.simpl.SimpleThreadPool
            threadCount: 5
            threadPriority: 5
name: "meta-web-three"
page-config:
  page-size: 20
aws:
  region: ap-southeast-1
  s3:
    buckets:
      name: metawebthree
# mybatis-plus
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: ASSIGN_ID
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
rocketmq:
  client:
    namesrv: rocketmq-namesrv:9876
    appliaction-topic: "MetaWebThree"
jwt:
  secret: mwt123123
  tokenHead: "Bearer "
internal-token:
  secret: mwt-internal-secret-2024
  timeout-seconds: 5
dubbo:
  application:
    name: ${spring.application.name}
  registry:
    protocol: zookeeper
    timeout: 30000
    address: ${spring.cloud.zookeeper.connect-string}
    group: /dev/metawebthree/dubbo # Separated from Spring Cloud to avoid JSON parsing conflict
  provider:
    timeout: 10000 # service call timeout
  protocol:
    port: -1
    name: tri
    serialization: protobuf
logging:
  expire-time: 2592000000 # 30 days
  data-path: logs/rocksdb-data/${spring.application.name}
elasticsearch:
  hosts: ${ELASTICSEARCH_HOST:elasticsearch:9200}

# Storage type: local / minio / s3
storage:
  type: local

digital-twin:
  cors:
    allowed-origins:
      - http://localhost:5173
      - http://127.0.0.1:5173
