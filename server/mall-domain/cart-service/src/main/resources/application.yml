server:
  port: 10090
spring:
  application:
    name: cart-service
  profiles:
    active: dev
dubbo:
  application:
    name: cart-service
  protocol:
    port: 20090
---
spring:
  config:
    activate:
      on-profile: dev
    import:
      - optional:classpath:application-common.yml
      - optional:classpath:application-common-dev.yml
---
spring:
  config:
    activate:
      on-profile: prod
    import:
      - optional:classpath:application-common.yml
      - optional:classpath:application-common-prod.yml
