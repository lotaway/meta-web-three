server:
  port: 10096
spring:
  application:
    name: mall-supplier-service
  profiles:
    active: dev
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.metawebthree.supplier.infrastructure.persistence.entity
dubbo:
  protocol:
    name: dubbo
    port: 20886
  provider:
    timeout: 5000
---
spring:
  config:
    activate:
      on-profile: dev
    import:
      - optional:classpath:application-common.yml
      - optional:classpath:application-common-dev.yml
---
spring:
  config:
    activate:
      on-profile: prod
    import:
      - optional:classpath:application-common.yml
      - optional:classpath:application-common-prod.yml