upload:
  quotas:
    USER:
      max-file-size: 10485760    # 10MB
      total-quota: 104857600     # 100MB

server:
  port: 10087
spring:
  application:
    name: media-service
  servlet:
    multipart:
      max-file-size: 500MB
      max-request-size: 512MB
  profiles:
    active: dev
dubbo:
  application:
    name: media-service
  protocol:
    port: 20089
---
spring:
  config:
    activate:
      on-profile: dev
    import: 
      # - optional:classpath:/config/application-common-${spring.profiles.active}.yml
      - optional:classpath:application-common.yml
      - optional:classpath:application-common-dev.yml
---
spring:
  config:
    activate:
      on-profile: prod
    import:
      - optional:classpath:application-common.yml
      - optional:classpath:application-common-prod.yml
