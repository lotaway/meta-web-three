version: '3.8'

services:
  digital-twin-frontend:
    build:
      context: ./system-management
      dockerfile: docker/Dockerfile
    container_name: digital-twin-frontend
    ports:
      - "3002:3000"
    environment:
      - VITE_API_URL=http://localhost:8080
      - VITE_WS_URL=ws://localhost:8082/ws
    env_file:
      - ../../.env
    networks:
      - meta-web-three
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  meta-web-three:
    external: true