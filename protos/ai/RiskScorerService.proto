syntax = "proto3";

package com.metawebthree.common.generated.rpc;

option java_multiple_files = true;
option java_outer_classname = "RiskScorerServiceProto";

import "ai/DeviceRiskTag.proto";

enum Scene {
    SCENE_UNSPECIFIED = 0;
    SCENE_LOGIN = 1;
    SCENE_REGISTER = 2;
    SCENE_ORDER = 3;
    SCENE_PAYMENT = 4;
}

enum RiskDecision {
    RISK_DECISION_UNSPECIFIED = 0;
    RISK_DECISION_APPROVE = 1;
    RISK_DECISION_REVIEW = 2;
    RISK_DECISION_REJECT = 3;
}

service RiskScorerService {
    rpc test (TestRequest) returns (TestResponse);
    rpc score(ScoreRequest) returns (ScoreResponse);
}

message Feature {
    oneof kind {
        int32 device_shared_degree = 1;
        DeviceRiskTag device_risk_tag = 2;
        float external_debt_ratio = 3;
        bool first_order = 4;
        float gps_stability = 5;
        int32 age = 6;
    }
}

message TestRequest {
}

message TestResponse {
    int32 result = 1;
}

message ScoreRequest {
    Scene scene = 1;
    map<string, Feature> features = 2;
}

message ScoreResponse {
    int32 score = 1;
    RiskDecision decision = 2;
}
