syntax = "proto3";

package com.metawebthree.common.generated.rpc;

option java_multiple_files = true;

service ProductService {
    rpc getProductDetail(GetProductDetailRequest) returns (GetProductDetailResponse);
    rpc listProducts(ListProductsRequest) returns (ListProductsResponse);
    rpc getProductBySku(GetProductBySkuRequest) returns (GetProductBySkuResponse);
    rpc createProduct(CreateProductRequest) returns (CreateProductResponse);
    rpc updateProduct(UpdateProductRequest) returns (UpdateProductResponse);
    rpc deleteProduct(DeleteProductRequest) returns (DeleteProductResponse);
}

message GetProductDetailRequest {
    int64 product_id = 1;
}

message GetProductDetailResponse {
    ProductDetailProto product = 1;
}

message ProductDetailProto {
    int64 id = 1;
    string name = 2;
    string pic = 3;
    string sub_title = 4;
    double price = 5;
    repeated string pictures = 6;
    string sku = 7;
    int32 stock = 8;
    int32 status = 9;
    int64 category_id = 10;
    string description = 11;
}

message ListProductsRequest {
    int32 page = 1;
    int32 size = 2;
    int64 category_id = 3;
}

message ListProductsResponse {
    repeated ProductDetailProto products = 1;
    int32 total_count = 2;
    int32 page = 3;
    int32 size = 4;
}

message GetProductBySkuRequest {
    string sku = 1;
}

message GetProductBySkuResponse {
    ProductDetailProto product = 1;
}

message CreateProductRequest {
    string name = 1;
    string sku = 2;
    double price = 3;
    int32 stock = 4;
    string pic = 5;
    string sub_title = 6;
    repeated string pictures = 7;
    int64 category_id = 8;
    string description = 9;
}

message CreateProductResponse {
    int64 id = 1;
    bool success = 2;
    string message = 3;
}

message UpdateProductRequest {
    int64 id = 1;
    string name = 2;
    string sku = 3;
    double price = 4;
    int32 stock = 5;
    string pic = 6;
    string sub_title = 7;
    repeated string pictures = 8;
    int64 category_id = 9;
    string description = 10;
    int32 status = 11;
}

message UpdateProductResponse {
    bool success = 1;
    string message = 2;
}

message DeleteProductRequest {
    int64 id = 1;
}

message DeleteProductResponse {
    bool success = 1;
    string message = 2;
}
