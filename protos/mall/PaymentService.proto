syntax = "proto3";

package com.metawebthree.common.generated.rpc;

option java_multiple_files = true;

service PaymentService {
    rpc getPaymentStatistics(GetPaymentStatisticsRequest) returns (GetPaymentStatisticsResponse);
    rpc getDailyPaymentStats(GetDailyPaymentStatsRequest) returns (GetDailyPaymentStatsResponse);
}

message GetPaymentStatisticsRequest {
}

message PaymentStatistics {
    int64 totalPayments = 1;
    int64 successPayments = 2;
    int64 failedPayments = 3;
    int64 pendingPayments = 4;
}

message GetPaymentStatisticsResponse {
    PaymentStatistics statistics = 1;
}

message GetDailyPaymentStatsRequest {
    int64 date = 1;
}

message DailyPaymentStats {
    int64 date = 1;
    int64 successCount = 2;
    int64 successAmount = 3;
    int64 failedCount = 4;
}

message GetDailyPaymentStatsResponse {
    DailyPaymentStats stats = 1;
}
