syntax = "proto3";

package com.metawebthree.common.generated.rpc;

option java_multiple_files = true;

service UserService {
    rpc getWalletAddressByUserId(GetWalletAddressByUserIdRequest) returns (GetWalletAddressByUserIdResponse);

    rpc getUserIdByWalletAddress(GetUserIdByWalletAddressRequest) returns (GetUserIdByWalletAddressResponse);

    rpc returnIntegration(ReturnIntegrationRequest) returns (ReturnIntegrationResponse);
    rpc getUserIntegration(GetUserIntegrationRequest) returns (GetUserIntegrationResponse);
    
    rpc addIntegration(AddIntegrationRequest) returns (AddIntegrationResponse);
    rpc addGrowth(AddGrowthRequest) returns (AddGrowthResponse);
    
    rpc getUserPhone(GetUserPhoneRequest) returns (GetUserPhoneResponse);
    rpc listUsers(ListUsersRequest) returns (ListUsersResponse);
}

message ReturnIntegrationRequest {
    int64 userId = 1;
    int32 integration = 2;
    int64 orderId = 3;
    string reason = 4;
}

message ReturnIntegrationResponse {
    bool success = 1;
    string message = 2;
    int32 currentIntegration = 3;
}

message GetUserIntegrationRequest {
    int64 userId = 1;
}

message GetUserIntegrationResponse {
    int64 userId = 1;
    int32 integration = 2;
}

message AddIntegrationRequest {
    int64 userId = 1;
    int32 integration = 2;
    int64 orderId = 3;
    string reason = 4;
}

message AddIntegrationResponse {
    bool success = 1;
    string message = 2;
    int32 currentIntegration = 3;
}

message AddGrowthRequest {
    int64 userId = 1;
    int32 growth = 2;
    int64 orderId = 3;
    string reason = 4;
}

message AddGrowthResponse {
    bool success = 1;
    string message = 2;
    int32 currentGrowth = 3;
}

message GetWalletAddressByUserIdRequest {
    int64 userId = 1;
}

message GetWalletAddressByUserIdResponse {
    string walletAddress = 1;
}

message GetUserIdByWalletAddressRequest {
    string walletAddress = 1;
}

message GetUserIdByWalletAddressResponse {
    int64 userId = 1;
}

message GetUserPhoneRequest {
    int64 userId = 1;
}

message GetUserPhoneResponse {
    string phone = 1;
    bool success = 2;
    string message = 3;
}

message ListUsersRequest {
    int32 page = 1;
    int32 size = 2;
}

message ListUsersResponse {
    repeated UserInfoProto users = 1;
    int32 total_count = 2;
    int32 page = 3;
    int32 size = 4;
}

message UserInfoProto {
    int64 id = 1;
    string username = 2;
    string phone = 3;
    string email = 4;
    string avatar = 5;
    int32 status = 6;
    int64 createdAt = 7;
}
