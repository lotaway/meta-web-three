syntax = "proto3";

package com.metawebthree.common.generated.rpc;

// option cc_enable_arenas = true;
option java_multiple_files = true;

import "shared/web3/token.proto";
// [From](https://github.com/googleapis)
import "shared/google/type/money.proto";

service OrderService {
    rpc getOrderByUserId(GetOrderByUserIdRequest) returns (GetOrderByUserIdResponse);
    rpc paySuccess(PaySuccessRequest) returns (PaySuccessResponse);
    rpc closeOrder(CloseOrderRequest) returns (CloseOrderResponse);
    rpc queryLogistics(QueryLogisticsRequest) returns (QueryLogisticsResponse);
    rpc createReturnApply(CreateReturnApplyRequest) returns (CreateReturnApplyResponse);
    // Statistics RPCs
    rpc getOrderStatusDistribution(GetOrderStatusDistributionRequest) returns (GetOrderStatusDistributionResponse);
    rpc getPendingOrdersCount(GetPendingOrdersCountRequest) returns (GetPendingOrdersCountResponse);
    rpc getPendingPaymentsCount(GetPendingPaymentsCountRequest) returns (GetPendingPaymentsCountResponse);
    // Analytics RPCs
    rpc getHotProducts(GetHotProductsRequest) returns (GetHotProductsResponse);
    rpc getSalesByHourToday(GetSalesByHourTodayRequest) returns (GetSalesByHourTodayResponse);
}

message GetOrderByUserIdRequest {
    int64 id = 1;
}

message GetOrderByUserIdResponse {
    repeated OrderDTO orders = 1;
}

message OrderDTO {
    int64 id = 1;
    int64 userId = 2;
    string orderNo = 3;
    string orderStatus = 4;
    string orderType = 5;
    google.type.Money orderAmount = 6;
    web3.Token tokens = 7;
    string orderRemark = 8;
}

message PaySuccessRequest {
    int64 orderId = 1;
    int32 payType = 2;
}

message PaySuccessResponse {
    bool success = 1;
    string message = 2;
}

message CloseOrderRequest {
    string ids = 1;
    string note = 2;
}

message CloseOrderResponse {
    bool success = 1;
    string message = 2;
}

message QueryLogisticsRequest {
    int64 orderId = 1;
}

message QueryLogisticsResponse {
    string logisticsCompany = 1;
    string trackingNumber = 2;
    repeated string traces = 3;
}

message CreateReturnApplyRequest {
    int64 orderId = 1;
    string reason = 2;
    int64 userId = 3;
}

message CreateReturnApplyResponse {
    bool success = 1;
    string message = 2;
}

// Statistics messages
message GetOrderStatusDistributionRequest {
}

message GetOrderStatusDistributionResponse {
    map<string, int64> distribution = 1;
}

message GetPendingOrdersCountRequest {
}

message GetPendingOrdersCountResponse {
    int64 count = 1;
}

message GetPendingPaymentsCountRequest {
}

message GetPendingPaymentsCountResponse {
    int64 count = 1;
}

// Analytics messages
message GetHotProductsRequest {
    int32 limit = 1;
}

message GetHotProductsResponse {
    repeated HotProductInfo products = 1;
}

message HotProductInfo {
    int64 productId = 1;
    string productName = 2;
    int64 salesCount = 3;
    int64 salesAmount = 4;
}

message GetSalesByHourTodayRequest {
}

message GetSalesByHourTodayResponse {
    repeated SalesByHourInfo hourlyData = 1;
}

message SalesByHourInfo {
    int32 hour = 1;
    int64 sales = 2;
    int32 orders = 3;
}