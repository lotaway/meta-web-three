syntax = "proto3";

package com.metawebthree.supplychain.generated.rpc;

option java_multiple_files = true;

enum RmaStatus {
    RMA_STATUS_UNSPECIFIED = 0;
    RMA_STATUS_PENDING = 1;
    RMA_STATUS_AWAITING_INSPECTION = 2;
    RMA_STATUS_INSPECTED = 3;
    RMA_STATUS_AWAITING_DISPOSITION = 4;
    RMA_STATUS_DISPOSED = 5;
    RMA_STATUS_COMPLETED = 6;
    RMA_STATUS_CANCELLED = 7;
}

enum RmaReturnType {
    RMA_RETURN_TYPE_UNSPECIFIED = 0;
    RMA_RETURN_TYPE_REFUND = 1;
    RMA_RETURN_TYPE_REPLACEMENT = 2;
    RMA_RETURN_TYPE_REPAIR = 3;
}

enum RmaInspectionResult {
    RMA_INSPECTION_RESULT_UNSPECIFIED = 0;
    RMA_INSPECTION_RESULT_PASS = 1;
    RMA_INSPECTION_RESULT_FAIL = 2;
    RMA_INSPECTION_RESULT_PARTIAL = 3;
}

enum RmaInspectionConclusion {
    RMA_INSPECTION_CONCLUSION_UNSPECIFIED = 0;
    RMA_INSPECTION_CONCLUSION_NO_ISSUE = 1;
    RMA_INSPECTION_CONCLUSION_MINOR_DEFECT = 2;
    RMA_INSPECTION_CONCLUSION_MAJOR_DEFECT = 3;
}

enum RmaDispositionType {
    RMA_DISPOSITION_TYPE_UNSPECIFIED = 0;
    RMA_DISPOSITION_TYPE_REFUND = 1;
    RMA_DISPOSITION_TYPE_REPLACEMENT = 2;
    RMA_DISPOSITION_TYPE_REPAIR = 3;
    RMA_DISPOSITION_TYPE_SCRAP = 4;
    RMA_DISPOSITION_TYPE_RETURN_TO_SUPPLIER = 5;
}

enum RmaShippingStatus {
    RMA_SHIPPING_STATUS_UNSPECIFIED = 0;
    RMA_SHIPPING_STATUS_PENDING = 1;
    RMA_SHIPPING_STATUS_SHIPPED = 2;
    RMA_SHIPPING_STATUS_IN_TRANSIT = 3;
    RMA_SHIPPING_STATUS_DELIVERED = 4;
    RMA_SHIPPING_STATUS_RETURNED = 5;
}

service RmaService {
    rpc getRmaOrder(GetRmaOrderRequest) returns (GetRmaOrderResponse);
    rpc listRmaOrders(ListRmaOrdersRequest) returns (ListRmaOrdersResponse);
    rpc createRmaOrder(CreateRmaOrderRequest) returns (CreateRmaOrderResponse);
    rpc submitForInspection(SubmitForInspectionRequest) returns (SubmitForInspectionResponse);
    rpc recordInspection(RecordInspectionRequest) returns (RecordInspectionResponse);
    rpc makeDisposition(MakeDispositionRequest) returns (MakeDispositionResponse);
    rpc executeDisposition(ExecuteDispositionRequest) returns (ExecuteDispositionResponse);
    rpc cancelRmaOrder(CancelRmaOrderRequest) returns (CancelRmaOrderResponse);
}

message GetRmaOrderRequest {
    int64 id = 1;
}

message GetRmaOrderResponse {
    RmaOrderDTO rmaOrder = 1;
}

message ListRmaOrdersRequest {
    RmaStatus status = 1;
    int32 pageNum = 2;
    int32 pageSize = 3;
}

message ListRmaOrdersResponse {
    repeated RmaOrderDTO rmaOrders = 1;
    int32 total = 2;
    int32 pageNum = 3;
    int32 pageSize = 4;
}

message CreateRmaOrderRequest {
    string orderNo = 1;
    RmaReturnType returnType = 2;
    string customerId = 3;
    string customerName = 4;
    string contactPhone = 5;
    string reasonCode = 6;
    string reasonDescription = 7;
    int64 warehouseId = 8;
    repeated RmaOrderItemDTO items = 9;
}

message CreateRmaOrderResponse {
    string rmaNo = 1;
    bool success = 2;
    string message = 3;
}

message SubmitForInspectionRequest {
    int64 rmaId = 1;
}

message SubmitForInspectionResponse {
    bool success = 1;
    string message = 2;
}

message RecordInspectionRequest {
    int64 rmaId = 1;
    string inspector = 2;
    RmaInspectionResult result = 3;
    RmaInspectionConclusion conclusion = 4;
    string remark = 5;
}

message RecordInspectionResponse {
    bool success = 1;
    string message = 2;
}

message MakeDispositionRequest {
    int64 rmaId = 1;
    RmaDispositionType dispositionType = 2;
    double refundAmount = 3;
    string replacementSkuCode = 4;
    int32 replacementQuantity = 5;
    string remark = 6;
}

message MakeDispositionResponse {
    bool success = 1;
    string message = 2;
}

message ExecuteDispositionRequest {
    int64 rmaId = 1;
}

message ExecuteDispositionResponse {
    bool success = 1;
    string message = 2;
}

message CancelRmaOrderRequest {
    int64 rmaId = 1;
    string reason = 2;
}

message CancelRmaOrderResponse {
    bool success = 1;
    string message = 2;
}

message RmaOrderDTO {
    int64 id = 1;
    string rmaNo = 2;
    string orderNo = 3;
    RmaReturnType returnType = 4;
    RmaStatus status = 5;
    string customerId = 6;
    string customerName = 7;
    string contactPhone = 8;
    string reasonCode = 9;
    string reasonDescription = 10;
    int64 warehouseId = 11;
    int32 totalQuantity = 12;
    double totalAmount = 13;
    string currency = 14;
    string createdBy = 15;
    int64 createdAt = 16;
    int64 updatedAt = 17;
    repeated RmaOrderItemDTO items = 18;
    RmaInspectionDTO inspection = 19;
    RmaDispositionDTO disposition = 20;
    ReturnShippingDTO returnShipping = 21;
}

message RmaOrderItemDTO {
    int64 id = 1;
    int64 rmaId = 2;
    string skuCode = 3;
    string skuName = 4;
    int32 expectedQuantity = 5;
    int32 inspectedQuantity = 6;
    int32 acceptedQuantity = 7;
    double unitPrice = 8;
    string reasonCode = 9;
    string reasonDescription = 10;
}

message RmaInspectionDTO {
    int64 id = 1;
    int64 rmaId = 2;
    string rmaNo = 3;
    string inspector = 4;
    int64 inspectionDate = 5;
    RmaInspectionResult result = 6;
    RmaInspectionConclusion conclusion = 7;
    int32 totalInspected = 8;
    int32 totalPassed = 9;
    int32 totalFailed = 10;
    string remark = 11;
}

message RmaDispositionDTO {
    int64 id = 1;
    int64 rmaId = 2;
    string rmaNo = 3;
    RmaDispositionType dispositionType = 4;
    double refundAmount = 5;
    string replacementSkuCode = 6;
    int32 replacementQuantity = 7;
    int32 scrapQuantity = 8;
    string scrapReason = 9;
    string dispositionBy = 10;
    int64 dispositionDate = 11;
    string remark = 12;
}

message ReturnShippingDTO {
    int64 id = 1;
    int64 rmaId = 2;
    string rmaNo = 3;
    string carrier = 4;
    string trackingNo = 5;
    string shippingMethod = 6;
    string originAddress = 7;
    string destinationAddress = 8;
    int64 shippingDate = 9;
    int64 estimatedArrivalDate = 10;
    RmaShippingStatus status = 11;
}
