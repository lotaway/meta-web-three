syntax = "proto3";

package com.metawebthree.factory.generated.rpc;

option java_multiple_files = true;

enum InspectionPlanStatus {
    INSPECTION_PLAN_STATUS_UNSPECIFIED = 0;
    INSPECTION_PLAN_STATUS_DRAFT = 1;
    INSPECTION_PLAN_STATUS_ACTIVE = 2;
    INSPECTION_PLAN_STATUS_INACTIVE = 3;
    INSPECTION_PLAN_STATUS_ARCHIVED = 4;
}

enum InspectionItemStatus {
    INSPECTION_ITEM_STATUS_UNSPECIFIED = 0;
    INSPECTION_ITEM_STATUS_ACTIVE = 1;
    INSPECTION_ITEM_STATUS_INACTIVE = 2;
}

enum InspectionTypeStatus {
    INSPECTION_TYPE_STATUS_UNSPECIFIED = 0;
    INSPECTION_TYPE_STATUS_ACTIVE = 1;
    INSPECTION_TYPE_STATUS_INACTIVE = 2;
}

enum SeverityLevel {
    SEVERITY_LEVEL_UNSPECIFIED = 0;
    SEVERITY_LEVEL_LOW = 1;
    SEVERITY_LEVEL_MEDIUM = 2;
    SEVERITY_LEVEL_HIGH = 3;
    SEVERITY_LEVEL_CRITICAL = 4;
}

enum NonConformanceType {
    NON_CONFORMANCE_TYPE_UNSPECIFIED = 0;
    NON_CONFORMANCE_TYPE_PRODUCT = 1;
    NON_CONFORMANCE_TYPE_PROCESS = 2;
    NON_CONFORMANCE_TYPE_SYSTEM = 3;
}

enum NonConformanceStatus {
    NON_CONFORMANCE_STATUS_UNSPECIFIED = 0;
    NON_CONFORMANCE_STATUS_OPEN = 1;
    NON_CONFORMANCE_STATUS_INVESTIGATING = 2;
    NON_CONFORMANCE_STATUS_RESOLVED = 3;
    NON_CONFORMANCE_STATUS_CLOSED = 4;
}

enum ChartType {
    CHART_TYPE_UNSPECIFIED = 0;
    CHART_TYPE_X_BAR_R = 1;
    CHART_TYPE_X_BAR_S = 2;
    CHART_TYPE_P = 3;
    CHART_TYPE_NP = 4;
    CHART_TYPE_C = 5;
    CHART_TYPE_U = 6;
    CHART_TYPE_I_MR = 7;
}

enum SpcChartStatus {
    SPC_CHART_STATUS_UNSPECIFIED = 0;
    SPC_CHART_STATUS_ACTIVE = 1;
    SPC_CHART_STATUS_INACTIVE = 2;
    SPC_CHART_STATUS_ARCHIVED = 3;
}

service QualityService {
    rpc getInspectionPlan(GetInspectionPlanRequest) returns (GetInspectionPlanResponse);
    rpc listInspectionPlans(ListInspectionPlansRequest) returns (ListInspectionPlansResponse);
    rpc createInspectionPlan(CreateInspectionPlanRequest) returns (CreateInspectionPlanResponse);
    rpc updateInspectionPlan(UpdateInspectionPlanRequest) returns (UpdateInspectionPlanResponse);
    rpc deleteInspectionPlan(DeleteInspectionPlanRequest) returns (DeleteInspectionPlanResponse);
    rpc activateInspectionPlan(ActivateInspectionPlanRequest) returns (ActivateInspectionPlanResponse);
    rpc deactivateInspectionPlan(DeactivateInspectionPlanRequest) returns (DeactivateInspectionPlanResponse);

    rpc getInspectionItem(GetInspectionItemRequest) returns (GetInspectionItemResponse);
    rpc listInspectionItems(ListInspectionItemsRequest) returns (ListInspectionItemsResponse);
    rpc createInspectionItem(CreateInspectionItemRequest) returns (CreateInspectionItemResponse);
    rpc updateInspectionItem(UpdateInspectionItemRequest) returns (UpdateInspectionItemResponse);
    rpc deleteInspectionItem(DeleteInspectionItemRequest) returns (DeleteInspectionItemResponse);

    rpc getInspectionType(GetInspectionTypeRequest) returns (GetInspectionTypeResponse);
    rpc listInspectionTypes(ListInspectionTypesRequest) returns (ListInspectionTypesResponse);
    rpc createInspectionType(CreateInspectionTypeRequest) returns (CreateInspectionTypeResponse);
    rpc updateInspectionType(UpdateInspectionTypeRequest) returns (UpdateInspectionTypeResponse);
    rpc deleteInspectionType(DeleteInspectionTypeRequest) returns (DeleteInspectionTypeResponse);

    rpc getDefectCode(GetDefectCodeRequest) returns (GetDefectCodeResponse);
    rpc listDefectCodes(ListDefectCodesRequest) returns (ListDefectCodesResponse);
    rpc createDefectCode(CreateDefectCodeRequest) returns (CreateDefectCodeResponse);
    rpc updateDefectCode(UpdateDefectCodeRequest) returns (UpdateDefectCodeResponse);
    rpc deleteDefectCode(DeleteDefectCodeRequest) returns (DeleteDefectCodeResponse);

    rpc getNonConformance(GetNonConformanceRequest) returns (GetNonConformanceResponse);
    rpc listNonConformances(ListNonConformancesRequest) returns (ListNonConformancesResponse);
    rpc createNonConformance(CreateNonConformanceRequest) returns (CreateNonConformanceResponse);
    rpc updateNonConformanceStatus(UpdateNonConformanceStatusRequest) returns (UpdateNonConformanceStatusResponse);

    rpc getSpcControlChart(GetSpcControlChartRequest) returns (GetSpcControlChartResponse);
    rpc listSpcControlCharts(ListSpcControlChartsRequest) returns (ListSpcControlChartsResponse);
    rpc createSpcControlChart(CreateSpcControlChartRequest) returns (CreateSpcControlChartResponse);
    rpc updateSpcControlChart(UpdateSpcControlChartRequest) returns (UpdateSpcControlChartResponse);
}

message QcPlanItemProto {
    int64 id = 1;
    int64 planId = 2;
    int64 itemId = 3;
    int32 itemSequence = 4;
    bool isMandatory = 5;
    string inspectionMethod = 6;
    string samplingRule = 7;
    int32 sortOrder = 8;
}
message InspectionPlanProto {
    int64 id = 1;
    string planCode = 2;
    string planName = 3;
    string inspectionType = 4;
    string applicableProductTypes = 5;
    int32 version = 6;
    string samplingPlanCode = 7;
    string samplingType = 8;
    string aql = 9;
    string inspectionLevel = 10;
    int32 sampleSize = 11;
    string acceptNumber = 12;
    string rejectNumber = 13;
    string dispositionRule = 14;
    InspectionPlanStatus status = 15;
    int64 effectiveDate = 16;
    int64 expirationDate = 17;
    string remark = 18;
    int64 createdAt = 19;
    int64 updatedAt = 20;
    repeated QcPlanItemProto planItems = 21;
}

message GetInspectionPlanRequest { int64 id = 1; }
message GetInspectionPlanResponse { InspectionPlanProto inspectionPlan = 1; }
message ListInspectionPlansRequest {
    InspectionPlanStatus status = 1;
    string inspectionType = 2;
    int32 page = 3;
    int32 size = 4;
}
message ListInspectionPlansResponse {
    repeated InspectionPlanProto inspectionPlans = 1;
    int32 totalCount = 2;
    int32 page = 3;
    int32 size = 4;
}
message CreateInspectionPlanRequest {
    string planCode = 1;
    string planName = 2;
    string inspectionType = 3;
    string samplingType = 4;
    string aql = 5;
    string inspectionLevel = 6;
    string dispositionRule = 7;
    string remark = 8;
}
message CreateInspectionPlanResponse { InspectionPlanProto inspectionPlan = 1; }
message UpdateInspectionPlanRequest {
    int64 id = 1;
    string planName = 2;
    string dispositionRule = 3;
    string remark = 4;
}
message UpdateInspectionPlanResponse { InspectionPlanProto inspectionPlan = 1; }
message DeleteInspectionPlanRequest { int64 id = 1; }
message DeleteInspectionPlanResponse { bool success = 1; }
message ActivateInspectionPlanRequest { int64 id = 1; }
message ActivateInspectionPlanResponse { bool success = 1; }
message DeactivateInspectionPlanRequest { int64 id = 1; }
message DeactivateInspectionPlanResponse { bool success = 1; }

message InspectionItemProto {
    int64 id = 1;
    string itemCode = 2;
    string itemName = 3;
    string itemCategory = 4;
    string dataType = 5;
    string unit = 6;
    double standardValue = 7;
    double upperLimit = 8;
    double lowerLimit = 9;
    string inspectionMethod = 10;
    string inspectionTool = 11;
    int32 severity = 12;
    bool isMandatory = 13;
    InspectionItemStatus status = 14;
    string remark = 15;
    int64 createdAt = 16;
    int64 updatedAt = 17;
}
message GetInspectionItemRequest { int64 id = 1; }
message GetInspectionItemResponse { InspectionItemProto inspectionItem = 1; }
message ListInspectionItemsRequest {
    string itemCategory = 1;
    InspectionItemStatus status = 2;
    int32 page = 3;
    int32 size = 4;
}
message ListInspectionItemsResponse {
    repeated InspectionItemProto inspectionItems = 1;
    int32 totalCount = 2;
    int32 page = 3;
    int32 size = 4;
}
message CreateInspectionItemRequest {
    string itemCode = 1;
    string itemName = 2;
    string itemCategory = 3;
    string dataType = 4;
    string unit = 5;
    double standardValue = 6;
    double upperLimit = 7;
    double lowerLimit = 8;
    string inspectionMethod = 9;
    int32 severity = 10;
    string remark = 11;
}
message CreateInspectionItemResponse { InspectionItemProto inspectionItem = 1; }
message UpdateInspectionItemRequest {
    int64 id = 1;
    string itemName = 2;
    double standardValue = 3;
    double upperLimit = 4;
    double lowerLimit = 5;
    string remark = 6;
}
message UpdateInspectionItemResponse { InspectionItemProto inspectionItem = 1; }
message DeleteInspectionItemRequest { int64 id = 1; }
message DeleteInspectionItemResponse { bool success = 1; }

message InspectionTypeProto {
    int64 id = 1;
    string typeCode = 2;
    string typeName = 3;
    string category = 4;
    string description = 5;
    string defaultSamplingPlan = 6;
    string defaultAql = 7;
    int32 defaultTimeoutHours = 8;
    bool requireCertificate = 9;
    bool requireTestReport = 10;
    InspectionTypeStatus status = 11;
    int64 createdAt = 12;
    int64 updatedAt = 13;
}
message GetInspectionTypeRequest { int64 id = 1; }
message GetInspectionTypeResponse { InspectionTypeProto inspectionType = 1; }
message ListInspectionTypesRequest {
    string category = 1;
    InspectionTypeStatus status = 2;
    int32 page = 3;
    int32 size = 4;
}
message ListInspectionTypesResponse {
    repeated InspectionTypeProto inspectionTypes = 1;
    int32 totalCount = 2;
    int32 page = 3;
    int32 size = 4;
}
message CreateInspectionTypeRequest {
    string typeCode = 1;
    string typeName = 2;
    string category = 3;
    string description = 4;
}
message CreateInspectionTypeResponse { InspectionTypeProto inspectionType = 1; }
message UpdateInspectionTypeRequest {
    int64 id = 1;
    string typeName = 2;
    string description = 3;
    InspectionTypeStatus status = 4;
}
message UpdateInspectionTypeResponse { InspectionTypeProto inspectionType = 1; }
message DeleteInspectionTypeRequest { int64 id = 1; }
message DeleteInspectionTypeResponse { bool success = 1; }

message DefectCodeProto {
    int64 id = 1;
    string defectCode = 2;
    string defectName = 3;
    string category = 4;
    SeverityLevel severity = 5;
    bool isCritical = 6;
    string description = 7;
    string dispositionGuide = 8;
    bool isEnabled = 9;
    int64 createdAt = 10;
    int64 updatedAt = 11;
}
message GetDefectCodeRequest { int64 id = 1; }
message GetDefectCodeResponse { DefectCodeProto defectCode = 1; }
message ListDefectCodesRequest {
    string category = 1;
    SeverityLevel severity = 2;
    int32 page = 3;
    int32 size = 4;
}
message ListDefectCodesResponse {
    repeated DefectCodeProto defectCodes = 1;
    int32 totalCount = 2;
    int32 page = 3;
    int32 size = 4;
}
message CreateDefectCodeRequest {
    string defectCode = 1;
    string defectName = 2;
    string category = 3;
    SeverityLevel severity = 4;
    bool isCritical = 5;
    string description = 6;
    string dispositionGuide = 7;
}
message CreateDefectCodeResponse { DefectCodeProto defectCode = 1; }
message UpdateDefectCodeRequest {
    int64 id = 1;
    string defectName = 2;
    SeverityLevel severity = 3;
    string dispositionGuide = 4;
    bool isEnabled = 5;
}
message UpdateDefectCodeResponse { DefectCodeProto defectCode = 1; }
message DeleteDefectCodeRequest { int64 id = 1; }
message DeleteDefectCodeResponse { bool success = 1; }

message NonConformanceProto {
    int64 id = 1;
    string ncCode = 2;
    string ncName = 3;
    NonConformanceType type = 4;
    string source = 5;
    string defectCode = 6;
    string description = 7;
    SeverityLevel severity = 8;
    NonConformanceStatus status = 9;
    string disposition = 10;
    string responsiblePerson = 11;
    string correctiveAction = 12;
    string preventiveAction = 13;
    int64 dueDate = 14;
    int64 closedDate = 15;
    int64 createdAt = 16;
    int64 updatedAt = 17;
}
message GetNonConformanceRequest { int64 id = 1; }
message GetNonConformanceResponse { NonConformanceProto nonConformance = 1; }
message ListNonConformancesRequest {
    NonConformanceStatus status = 1;
    SeverityLevel severity = 2;
    int32 page = 3;
    int32 size = 4;
}
message ListNonConformancesResponse {
    repeated NonConformanceProto nonConformances = 1;
    int32 totalCount = 2;
    int32 page = 3;
    int32 size = 4;
}
message CreateNonConformanceRequest {
    string ncCode = 1;
    string ncName = 2;
    NonConformanceType type = 3;
    string defectCode = 4;
    string description = 5;
    SeverityLevel severity = 6;
    string responsiblePerson = 7;
    string correctiveAction = 8;
    int64 dueDate = 9;
}
message CreateNonConformanceResponse { NonConformanceProto nonConformance = 1; }
message UpdateNonConformanceStatusRequest {
    int64 id = 1;
    NonConformanceStatus status = 2;
    string disposition = 3;
    int64 closedDate = 4;
}
message UpdateNonConformanceStatusResponse { bool success = 1; }

message SpcControlChartProto {
    int64 id = 1;
    string chartCode = 2;
    string chartName = 3;
    ChartType chartType = 4;
    int64 inspectionItemId = 5;
    double centerLine = 6;
    double upperControlLimit = 7;
    double lowerControlLimit = 8;
    double upperSpecLimit = 9;
    double lowerSpecLimit = 10;
    int32 sampleSize = 11;
    SpcChartStatus status = 12;
    string remark = 13;
    int64 createdAt = 14;
    int64 updatedAt = 15;
}
message GetSpcControlChartRequest { int64 id = 1; }
message GetSpcControlChartResponse { SpcControlChartProto chart = 1; }
message ListSpcControlChartsRequest {
    ChartType chartType = 1;
    SpcChartStatus status = 2;
    int32 page = 3;
    int32 size = 4;
}
message ListSpcControlChartsResponse {
    repeated SpcControlChartProto charts = 1;
    int32 totalCount = 2;
    int32 page = 3;
    int32 size = 4;
}
message CreateSpcControlChartRequest {
    string chartCode = 1;
    string chartName = 2;
    ChartType chartType = 3;
    int64 inspectionItemId = 4;
    double centerLine = 5;
    double upperControlLimit = 6;
    double lowerControlLimit = 7;
    string remark = 8;
}
message CreateSpcControlChartResponse { SpcControlChartProto chart = 1; }
message UpdateSpcControlChartRequest {
    int64 id = 1;
    string chartName = 2;
    double centerLine = 3;
    double upperControlLimit = 4;
    double lowerControlLimit = 5;
    SpcChartStatus status = 6;
    string remark = 7;
}
message UpdateSpcControlChartResponse { SpcControlChartProto chart = 1; }
