syntax = "proto3";

package com.metawebthree.factory.generated.rpc;

option java_multiple_files = true;

service MesService {
    // Work Order
    rpc getWorkOrder(GetWorkOrderRequest) returns (GetWorkOrderResponse);
    rpc listWorkOrders(ListWorkOrdersRequest) returns (ListWorkOrdersResponse);
    rpc createWorkOrder(CreateWorkOrderRequest) returns (CreateWorkOrderResponse);
    rpc updateWorkOrder(UpdateWorkOrderRequest) returns (UpdateWorkOrderResponse);
    rpc deleteWorkOrder(DeleteWorkOrderRequest) returns (DeleteWorkOrderResponse);
    rpc releaseWorkOrder(ReleaseWorkOrderRequest) returns (ReleaseWorkOrderResponse);
    rpc startWorkOrder(StartWorkOrderRequest) returns (StartWorkOrderResponse);
    rpc completeWorkOrder(CompleteWorkOrderRequest) returns (CompleteWorkOrderResponse);
    rpc cancelWorkOrder(CancelWorkOrderRequest) returns (CancelWorkOrderResponse);
    rpc pauseWorkOrder(PauseWorkOrderRequest) returns (PauseWorkOrderResponse);
    rpc resumeWorkOrder(ResumeWorkOrderRequest) returns (ResumeWorkOrderResponse);

    // Production Task
    rpc getProductionTask(GetProductionTaskRequest) returns (GetProductionTaskResponse);
    rpc listProductionTasks(ListProductionTasksRequest) returns (ListProductionTasksResponse);
    rpc createProductionTask(CreateProductionTaskRequest) returns (CreateProductionTaskResponse);
    rpc startProductionTask(StartProductionTaskRequest) returns (StartProductionTaskResponse);
    rpc completeProductionTask(CompleteProductionTaskRequest) returns (CompleteProductionTaskResponse);
    rpc failQualityCheck(FailQualityCheckRequest) returns (FailQualityCheckResponse);
    rpc scrapProductionTask(ScrapProductionTaskRequest) returns (ScrapProductionTaskResponse);

    // Process Route
    rpc getProcessRoute(GetProcessRouteRequest) returns (GetProcessRouteResponse);
    rpc listProcessRoutes(ListProcessRoutesRequest) returns (ListProcessRoutesResponse);
    rpc createProcessRoute(CreateProcessRouteRequest) returns (CreateProcessRouteResponse);
    rpc updateProcessRoute(UpdateProcessRouteRequest) returns (UpdateProcessRouteResponse);
    rpc deleteProcessRoute(DeleteProcessRouteRequest) returns (DeleteProcessRouteResponse);
    rpc activateProcessRoute(ActivateProcessRouteRequest) returns (ActivateProcessRouteResponse);

    // BOM
    rpc getBom(GetBomRequest) returns (GetBomResponse);
    rpc listBoms(ListBomsRequest) returns (ListBomsResponse);
    rpc createBom(CreateBomRequest) returns (CreateBomResponse);
    rpc updateBom(UpdateBomRequest) returns (UpdateBomResponse);
    rpc deleteBom(DeleteBomRequest) returns (DeleteBomResponse);

    // Work Report
    rpc getWorkReport(GetWorkReportRequest) returns (GetWorkReportResponse);
    rpc listWorkReports(ListWorkReportsRequest) returns (ListWorkReportsResponse);
    rpc createWorkReport(CreateWorkReportRequest) returns (CreateWorkReportResponse);

    // Workstation
    rpc getWorkstation(GetWorkstationRequest) returns (GetWorkstationResponse);
    rpc listWorkstations(ListWorkstationsRequest) returns (ListWorkstationsResponse);
    rpc createWorkstation(CreateWorkstationRequest) returns (CreateWorkstationResponse);
    rpc updateWorkstation(UpdateWorkstationRequest) returns (UpdateWorkstationResponse);

    // Andon
    rpc getAndonEvent(GetAndonEventRequest) returns (GetAndonEventResponse);
    rpc listAndonEvents(ListAndonEventsRequest) returns (ListAndonEventsResponse);
    rpc triggerAndon(TriggerAndonRequest) returns (TriggerAndonResponse);
    rpc acknowledgeAndon(AcknowledgeAndonRequest) returns (AcknowledgeAndonResponse);
    rpc resolveAndon(ResolveAndonRequest) returns (ResolveAndonResponse);
    rpc closeAndon(CloseAndonRequest) returns (CloseAndonResponse);
    rpc escalateAndon(EscalateAndonRequest) returns (EscalateAndonResponse);
    rpc createAndonType(CreateAndonTypeRequest) returns (CreateAndonTypeResponse);
    rpc listAndonTypes(ListAndonTypesRequest) returns (ListAndonTypesResponse);

    // Trace
    rpc getTraceRecord(GetTraceRecordRequest) returns (GetTraceRecordResponse);
    rpc listTraceRecords(ListTraceRecordsRequest) returns (ListTraceRecordsResponse);
    rpc createTraceRecord(CreateTraceRecordRequest) returns (CreateTraceRecordResponse);
    rpc forwardTrace(ForwardTraceRequest) returns (ForwardTraceResponse);
    rpc backwardTrace(BackwardTraceRequest) returns (BackwardTraceResponse);

    // Labor
    rpc getOperator(GetOperatorRequest) returns (GetOperatorResponse);
    rpc listOperators(ListOperatorsRequest) returns (ListOperatorsResponse);
    rpc createOperator(CreateOperatorRequest) returns (CreateOperatorResponse);
    rpc updateOperator(UpdateOperatorRequest) returns (UpdateOperatorResponse);
    rpc getAttendance(GetAttendanceRequest) returns (GetAttendanceResponse);
    rpc listAttendances(ListAttendancesRequest) returns (ListAttendancesResponse);
    rpc createAttendance(CreateAttendanceRequest) returns (CreateAttendanceResponse);
    rpc listTimeRecords(ListTimeRecordsRequest) returns (ListTimeRecordsResponse);
    rpc createTimeRecord(CreateTimeRecordRequest) returns (CreateTimeRecordResponse);

    // SCADA
    rpc getTelemetryRecord(GetTelemetryRecordRequest) returns (GetTelemetryRecordResponse);
    rpc listTelemetryRecords(ListTelemetryRecordsRequest) returns (ListTelemetryRecordsResponse);
    rpc sendDeviceCommand(SendDeviceCommandRequest) returns (SendDeviceCommandResponse);
    rpc listDeviceCommands(ListDeviceCommandsRequest) returns (ListDeviceCommandsResponse);

    // Process Parameter
    rpc getProcessParameter(GetProcessParameterRequest) returns (GetProcessParameterResponse);
    rpc listProcessParameters(ListProcessParametersRequest) returns (ListProcessParametersResponse);
    rpc createProcessParameter(CreateProcessParameterRequest) returns (CreateProcessParameterResponse);
    rpc updateProcessParameter(UpdateProcessParameterRequest) returns (UpdateProcessParameterResponse);
    rpc deleteProcessParameter(DeleteProcessParameterRequest) returns (DeleteProcessParameterResponse);

    // Material Requirement
    rpc getMaterialRequirement(GetMaterialRequirementRequest) returns (GetMaterialRequirementResponse);
    rpc listMaterialRequirements(ListMaterialRequirementsRequest) returns (ListMaterialRequirementsResponse);
    rpc createMaterialRequirement(CreateMaterialRequirementRequest) returns (CreateMaterialRequirementResponse);
}

// ===== Work Order =====
message WorkOrderProto {
    int64 id = 1;
    string workOrderNo = 2;
    string productCode = 3;
    string productName = 4;
    int32 quantity = 5;
    int32 completedQuantity = 6;
    string status = 7;
    string typeCode = 8;
    string priority = 9;
    string workshopId = 10;
    string processRouteId = 11;
    int64 parentWorkOrderId = 12;
    int32 splitSequence = 13;
    string plannedStartTime = 14;
    string plannedEndTime = 15;
    string actualStartTime = 16;
    string actualEndTime = 17;
    int64 createdAt = 18;
    int64 updatedAt = 19;
}

message GetWorkOrderRequest { int64 id = 1; }
message GetWorkOrderResponse { WorkOrderProto workOrder = 1; }
message ListWorkOrdersRequest {
    string status = 1;
    string workshopId = 2;
    int32 page = 3;
    int32 size = 4;
}
message ListWorkOrdersResponse {
    repeated WorkOrderProto workOrders = 1;
    int32 totalCount = 2;
    int32 page = 3;
    int32 size = 4;
}
message CreateWorkOrderRequest {
    string workOrderNo = 1;
    string productCode = 2;
    string productName = 3;
    int32 quantity = 4;
    string priority = 5;
    string workshopId = 6;
    string processRouteId = 7;
    string plannedStartTime = 8;
    string plannedEndTime = 9;
}
message CreateWorkOrderResponse { WorkOrderProto workOrder = 1; }
message UpdateWorkOrderRequest {
    int64 id = 1;
    string productName = 2;
    int32 quantity = 3;
    string plannedEndTime = 4;
}
message UpdateWorkOrderResponse { WorkOrderProto workOrder = 1; }
message DeleteWorkOrderRequest { int64 id = 1; }
message DeleteWorkOrderResponse { bool success = 1; }
message ReleaseWorkOrderRequest { int64 id = 1; }
message ReleaseWorkOrderResponse { bool success = 1; }
message StartWorkOrderRequest { int64 id = 1; }
message StartWorkOrderResponse { bool success = 1; }
message CompleteWorkOrderRequest { int64 id = 1; }
message CompleteWorkOrderResponse { bool success = 1; }
message CancelWorkOrderRequest { int64 id = 1; }
message CancelWorkOrderResponse { bool success = 1; }
message PauseWorkOrderRequest { int64 id = 1; }
message PauseWorkOrderResponse { bool success = 1; }
message ResumeWorkOrderRequest { int64 id = 1; }
message ResumeWorkOrderResponse { bool success = 1; }

