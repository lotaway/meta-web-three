syntax = "proto3";

package com.metawebthree.factory.generated.rpc;

option java_multiple_files = true;

enum WorkOrderStatus {
    WORK_ORDER_STATUS_UNSPECIFIED = 0;
    WORK_ORDER_STATUS_PENDING = 1;
    WORK_ORDER_STATUS_RELEASED = 2;
    WORK_ORDER_STATUS_IN_PROGRESS = 3;
    WORK_ORDER_STATUS_COMPLETED = 4;
    WORK_ORDER_STATUS_CANCELLED = 5;
    WORK_ORDER_STATUS_PAUSED = 6;
}

enum WorkOrderPriority {
    WORK_ORDER_PRIORITY_UNSPECIFIED = 0;
    WORK_ORDER_PRIORITY_LOW = 1;
    WORK_ORDER_PRIORITY_MEDIUM = 2;
    WORK_ORDER_PRIORITY_HIGH = 3;
    WORK_ORDER_PRIORITY_CRITICAL = 4;
}

enum ProductionTaskStatus {
    PRODUCTION_TASK_STATUS_UNSPECIFIED = 0;
    PRODUCTION_TASK_STATUS_PENDING = 1;
    PRODUCTION_TASK_STATUS_IN_PROGRESS = 2;
    PRODUCTION_TASK_STATUS_COMPLETED = 3;
    PRODUCTION_TASK_STATUS_FAILED = 4;
    PRODUCTION_TASK_STATUS_SCRAPPED = 5;
}

enum WorkReportStatus {
    WORK_REPORT_STATUS_UNSPECIFIED = 0;
    WORK_REPORT_STATUS_DRAFT = 1;
    WORK_REPORT_STATUS_SUBMITTED = 2;
    WORK_REPORT_STATUS_APPROVED = 3;
    WORK_REPORT_STATUS_REJECTED = 4;
}

enum WorkstationStatus {
    WORKSTATION_STATUS_UNSPECIFIED = 0;
    WORKSTATION_STATUS_ACTIVE = 1;
    WORKSTATION_STATUS_INACTIVE = 2;
    WORKSTATION_STATUS_MAINTENANCE = 3;
    WORKSTATION_STATUS_OFFLINE = 4;
}

enum WorkstationType {
    WORKSTATION_TYPE_UNSPECIFIED = 0;
    WORKSTATION_TYPE_ASSEMBLY = 1;
    WORKSTATION_TYPE_MACHINING = 2;
    WORKSTATION_TYPE_PACKAGING = 3;
    WORKSTATION_TYPE_TESTING = 4;
    WORKSTATION_TYPE_STORAGE = 5;
}

service MesService {
    rpc getWorkOrder(GetWorkOrderRequest) returns (GetWorkOrderResponse);
    rpc listWorkOrders(ListWorkOrdersRequest) returns (ListWorkOrdersResponse);
    rpc createWorkOrder(CreateWorkOrderRequest) returns (CreateWorkOrderResponse);
    rpc updateWorkOrder(UpdateWorkOrderRequest) returns (UpdateWorkOrderResponse);
    rpc deleteWorkOrder(DeleteWorkOrderRequest) returns (DeleteWorkOrderResponse);
    rpc releaseWorkOrder(ReleaseWorkOrderRequest) returns (ReleaseWorkOrderResponse);
    rpc startWorkOrder(StartWorkOrderRequest) returns (StartWorkOrderResponse);
    rpc completeWorkOrder(CompleteWorkOrderRequest) returns (CompleteWorkOrderResponse);
    rpc cancelWorkOrder(CancelWorkOrderRequest) returns (CancelWorkOrderResponse);
    rpc pauseWorkOrder(PauseWorkOrderRequest) returns (PauseWorkOrderResponse);
    rpc resumeWorkOrder(ResumeWorkOrderRequest) returns (ResumeWorkOrderResponse);

    rpc getProductionTask(GetProductionTaskRequest) returns (GetProductionTaskResponse);
    rpc listProductionTasks(ListProductionTasksRequest) returns (ListProductionTasksResponse);
    rpc createProductionTask(CreateProductionTaskRequest) returns (CreateProductionTaskResponse);
    rpc startProductionTask(StartProductionTaskRequest) returns (StartProductionTaskResponse);
    rpc completeProductionTask(CompleteProductionTaskRequest) returns (CompleteProductionTaskResponse);
    rpc failQualityCheck(FailQualityCheckRequest) returns (FailQualityCheckResponse);
    rpc scrapProductionTask(ScrapProductionTaskRequest) returns (ScrapProductionTaskResponse);

    rpc getWorkReport(GetWorkReportRequest) returns (GetWorkReportResponse);
    rpc listWorkReports(ListWorkReportsRequest) returns (ListWorkReportsResponse);
    rpc createWorkReport(CreateWorkReportRequest) returns (CreateWorkReportResponse);

    rpc getWorkstation(GetWorkstationRequest) returns (GetWorkstationResponse);
    rpc listWorkstations(ListWorkstationsRequest) returns (ListWorkstationsResponse);
    rpc createWorkstation(CreateWorkstationRequest) returns (CreateWorkstationResponse);
    rpc updateWorkstation(UpdateWorkstationRequest) returns (UpdateWorkstationResponse);
}

message WorkOrderProto {
    int64 id = 1;
    string workOrderNo = 2;
    string productCode = 3;
    string productName = 4;
    int32 quantity = 5;
    int32 completedQuantity = 6;
    WorkOrderStatus status = 7;
    string typeCode = 8;
    WorkOrderPriority priority = 9;
    string workshopId = 10;
    string processRouteId = 11;
    int64 parentWorkOrderId = 12;
    int32 splitSequence = 13;
    int64 plannedStartTime = 14;
    int64 plannedEndTime = 15;
    int64 actualStartTime = 16;
    int64 actualEndTime = 17;
    int64 createdAt = 18;
    int64 updatedAt = 19;
}

message GetWorkOrderRequest { int64 id = 1; }
message GetWorkOrderResponse { WorkOrderProto workOrder = 1; }
message ListWorkOrdersRequest {
    WorkOrderStatus status = 1;
    string workshopId = 2;
    int32 page = 3;
    int32 size = 4;
}
message ListWorkOrdersResponse {
    repeated WorkOrderProto workOrders = 1;
    int32 totalCount = 2;
    int32 page = 3;
    int32 size = 4;
}
message CreateWorkOrderRequest {
    string workOrderNo = 1;
    string productCode = 2;
    string productName = 3;
    int32 quantity = 4;
    WorkOrderPriority priority = 5;
    string workshopId = 6;
    string processRouteId = 7;
    int64 plannedStartTime = 8;
    int64 plannedEndTime = 9;
}
message CreateWorkOrderResponse { WorkOrderProto workOrder = 1; }
message UpdateWorkOrderRequest {
    int64 id = 1;
    string productName = 2;
    int32 quantity = 3;
    int64 plannedEndTime = 4;
}
message UpdateWorkOrderResponse { WorkOrderProto workOrder = 1; }
message DeleteWorkOrderRequest { int64 id = 1; }
message DeleteWorkOrderResponse { bool success = 1; }
message ReleaseWorkOrderRequest { int64 id = 1; }
message ReleaseWorkOrderResponse { bool success = 1; }
message StartWorkOrderRequest { int64 id = 1; }
message StartWorkOrderResponse { bool success = 1; }
message CompleteWorkOrderRequest { int64 id = 1; }
message CompleteWorkOrderResponse { bool success = 1; }
message CancelWorkOrderRequest { int64 id = 1; }
message CancelWorkOrderResponse { bool success = 1; }
message PauseWorkOrderRequest { int64 id = 1; }
message PauseWorkOrderResponse { bool success = 1; }
message ResumeWorkOrderRequest { int64 id = 1; }
message ResumeWorkOrderResponse { bool success = 1; }

message ProductionTaskProto {
    int64 id = 1;
    string taskNo = 2;
    int64 workOrderId = 3;
    int64 workstationId = 4;
    string processCode = 5;
    ProductionTaskStatus status = 6;
    int32 quantity = 7;
    int32 completedQuantity = 8;
    int32 qualifiedQuantity = 9;
    int32 defectiveQuantity = 10;
    int32 actualDurationMinutes = 11;
    string operatorId = 12;
    int64 startTime = 13;
    int64 endTime = 14;
    int64 createdAt = 15;
    int64 updatedAt = 16;
}

message GetProductionTaskRequest { int64 id = 1; }
message GetProductionTaskResponse { ProductionTaskProto task = 1; }
message ListProductionTasksRequest {
    int64 workOrderId = 1;
    ProductionTaskStatus status = 2;
    int64 workstationId = 3;
    int32 page = 4;
    int32 size = 5;
}
message ListProductionTasksResponse {
    repeated ProductionTaskProto tasks = 1;
    int32 totalCount = 2;
    int32 page = 3;
    int32 size = 4;
}
message CreateProductionTaskRequest {
    string taskNo = 1;
    int64 workOrderId = 2;
    int64 workstationId = 3;
    string processCode = 4;
    int32 quantity = 5;
    string operatorId = 6;
}
message CreateProductionTaskResponse { ProductionTaskProto task = 1; }
message StartProductionTaskRequest { int64 id = 1; }
message StartProductionTaskResponse { bool success = 1; }
message CompleteProductionTaskRequest {
    int64 id = 1;
    int32 qualifiedQuantity = 2;
    int32 defectiveQuantity = 3;
}
message CompleteProductionTaskResponse { bool success = 1; }
message FailQualityCheckRequest {
    int64 id = 1;
    string reason = 2;
}
message FailQualityCheckResponse { bool success = 1; }
message ScrapProductionTaskRequest {
    int64 id = 1;
    string reason = 2;
}
message ScrapProductionTaskResponse { bool success = 1; }

message WorkReportProto {
    int64 id = 1;
    string reportNo = 2;
    int64 taskId = 3;
    string taskNo = 4;
    int64 workOrderId = 5;
    string workOrderNo = 6;
    string workstationName = 7;
    string processCode = 8;
    string processName = 9;
    int32 stepNo = 10;
    string operatorId = 11;
    string operatorName = 12;
    int64 reportTime = 13;
    int32 quantity = 14;
    int32 qualifiedQuantity = 15;
    int32 defectiveQuantity = 16;
    int32 durationMinutes = 17;
    string remarks = 18;
    WorkReportStatus status = 19;
    int64 createdAt = 20;
}
message GetWorkReportRequest { int64 id = 1; }
message GetWorkReportResponse { WorkReportProto workReport = 1; }
message ListWorkReportsRequest {
    int64 workOrderId = 1;
    int64 taskId = 2;
    int32 page = 3;
    int32 size = 4;
}
message ListWorkReportsResponse {
    repeated WorkReportProto workReports = 1;
    int32 totalCount = 2;
    int32 page = 3;
    int32 size = 4;
}
message CreateWorkReportRequest {
    string reportNo = 1;
    int64 taskId = 2;
    int64 workOrderId = 3;
    string processCode = 4;
    string operatorId = 5;
    int32 quantity = 6;
    int32 qualifiedQuantity = 7;
    int32 defectiveQuantity = 8;
    int32 durationMinutes = 9;
    string remarks = 10;
}
message CreateWorkReportResponse { WorkReportProto workReport = 1; }

message WorkstationProto {
    int64 id = 1;
    string workstationCode = 2;
    string workstationName = 3;
    string workshopId = 4;
    string workshopName = 5;
    WorkstationType type = 6;
    WorkstationStatus status = 7;
    string location = 8;
    int32 capacity = 9;
    string description = 10;
    int64 createdAt = 11;
    int64 updatedAt = 12;
}
message GetWorkstationRequest { int64 id = 1; }
message GetWorkstationResponse { WorkstationProto workstation = 1; }
message ListWorkstationsRequest {
    string workshopId = 1;
    WorkstationStatus status = 2;
    int32 page = 3;
    int32 size = 4;
}
message ListWorkstationsResponse {
    repeated WorkstationProto workstations = 1;
    int32 totalCount = 2;
    int32 page = 3;
    int32 size = 4;
}
message CreateWorkstationRequest {
    string workstationCode = 1;
    string workstationName = 2;
    string workshopId = 3;
    WorkstationType type = 4;
    int32 capacity = 5;
    string description = 6;
}
message CreateWorkstationResponse { WorkstationProto workstation = 1; }
message UpdateWorkstationRequest {
    int64 id = 1;
    string workstationName = 2;
    WorkstationStatus status = 3;
    string description = 4;
}
message UpdateWorkstationResponse { WorkstationProto workstation = 1; }
