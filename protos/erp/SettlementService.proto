syntax = "proto3";

package com.metawebthree.erp.generated.rpc;

option java_multiple_files = true;

enum SettlementStatus {
    SETTLEMENT_STATUS_UNSPECIFIED = 0;
    SETTLEMENT_STATUS_PENDING = 1;
    SETTLEMENT_STATUS_PROCESSING = 2;
    SETTLEMENT_STATUS_COMPLETED = 3;
    SETTLEMENT_STATUS_FAILED = 4;
    SETTLEMENT_STATUS_CANCELLED = 5;
}

enum SettlementChannel {
    SETTLEMENT_CHANNEL_UNSPECIFIED = 0;
    SETTLEMENT_CHANNEL_BANK = 1;
    SETTLEMENT_CHANNEL_ALIPAY = 2;
    SETTLEMENT_CHANNEL_WECHAT = 3;
    SETTLEMENT_CHANNEL_OTHER = 4;
}

enum LogisticsSettlementStatus {
    LOGISTICS_SETTLEMENT_STATUS_UNSPECIFIED = 0;
    LOGISTICS_SETTLEMENT_STATUS_PENDING = 1;
    LOGISTICS_SETTLEMENT_STATUS_CONFIRMED = 2;
    LOGISTICS_SETTLEMENT_STATUS_COMPLETED = 3;
}

enum SplitRuleType {
    SPLIT_RULE_TYPE_UNSPECIFIED = 0;
    SPLIT_RULE_TYPE_PERCENTAGE = 1;
    SPLIT_RULE_TYPE_FIXED = 2;
}

enum SplitRuleStatus {
    SPLIT_RULE_STATUS_UNSPECIFIED = 0;
    SPLIT_RULE_STATUS_ACTIVE = 1;
    SPLIT_RULE_STATUS_INACTIVE = 2;
}

enum ReconciliationType {
    RECONCILIATION_TYPE_UNSPECIFIED = 0;
    RECONCILIATION_TYPE_DAILY = 1;
    RECONCILIATION_TYPE_WEEKLY = 2;
    RECONCILIATION_TYPE_MONTHLY = 3;
}

enum ReconciliationChannel {
    RECONCILIATION_CHANNEL_UNSPECIFIED = 0;
    RECONCILIATION_CHANNEL_BANK = 1;
    RECONCILIATION_CHANNEL_ALIPAY = 2;
    RECONCILIATION_CHANNEL_WECHAT = 3;
    RECONCILIATION_CHANNEL_OTHER = 4;
}

enum ReconciliationStatus {
    RECONCILIATION_STATUS_UNSPECIFIED = 0;
    RECONCILIATION_STATUS_UNMATCHED = 1;
    RECONCILIATION_STATUS_MATCHED = 2;
    RECONCILIATION_STATUS_SETTLED = 3;
}

service SettlementService {
    rpc getSettlementOrder(GetSettlementOrderRequest) returns (GetSettlementOrderResponse);
    rpc listSettlementOrders(ListSettlementOrdersRequest) returns (ListSettlementOrdersResponse);
    rpc createSettlementOrder(CreateSettlementOrderRequest) returns (CreateSettlementOrderResponse);
    rpc confirmSettlement(ConfirmSettlementRequest) returns (ConfirmSettlementResponse);
    rpc processSettlement(ProcessSettlementRequest) returns (ProcessSettlementResponse);
    rpc completeSettlement(CompleteSettlementRequest) returns (CompleteSettlementResponse);
    rpc failSettlement(FailSettlementRequest) returns (FailSettlementResponse);
    rpc cancelSettlement(CancelSettlementRequest) returns (CancelSettlementResponse);
    rpc applyRefund(ApplyRefundRequest) returns (ApplyRefundResponse);

    rpc getLogisticsSettlement(GetLogisticsSettlementRequest) returns (GetLogisticsSettlementResponse);
    rpc listLogisticsSettlements(ListLogisticsSettlementsRequest) returns (ListLogisticsSettlementsResponse);
    rpc createLogisticsSettlement(CreateLogisticsSettlementRequest) returns (CreateLogisticsSettlementResponse);
    rpc confirmLogisticsSettlement(ConfirmLogisticsSettlementRequest) returns (ConfirmLogisticsSettlementResponse);
    rpc completeLogisticsSettlement(CompleteLogisticsSettlementRequest) returns (CompleteLogisticsSettlementResponse);

    rpc getSplitRule(GetSplitRuleRequest) returns (GetSplitRuleResponse);
    rpc listSplitRules(ListSplitRulesRequest) returns (ListSplitRulesResponse);
    rpc createSplitRule(CreateSplitRuleRequest) returns (CreateSplitRuleResponse);
    rpc updateSplitRule(UpdateSplitRuleRequest) returns (UpdateSplitRuleResponse);
    rpc deleteSplitRule(DeleteSplitRuleRequest) returns (DeleteSplitRuleResponse);

    rpc getReconciliationRecord(GetReconciliationRecordRequest) returns (GetReconciliationRecordResponse);
    rpc listReconciliationRecords(ListReconciliationRecordsRequest) returns (ListReconciliationRecordsResponse);
    rpc createReconciliationRecord(CreateReconciliationRecordRequest) returns (CreateReconciliationRecordResponse);
}

message SettlementOrderProto {
    int64 id = 1;
    string settlementNo = 2;
    string orderNo = 3;
    int64 merchantId = 4;
    string merchantName = 5;
    double orderAmount = 6;
    double settlementAmount = 7;
    double commissionAmount = 8;
    double refundAmount = 9;
    SettlementStatus status = 10;
    SettlementChannel channel = 11;
    int64 settlementDate = 12;
    string description = 13;
    int64 createdAt = 14;
    int64 updatedAt = 15;
}

message GetSettlementOrderRequest { int64 id = 1; }
message GetSettlementOrderResponse { SettlementOrderProto settlementOrder = 1; }
message ListSettlementOrdersRequest {
    SettlementStatus status = 1;
    int64 merchantId = 2;
    int64 startDate = 3;
    int64 endDate = 4;
    int32 page = 5;
    int32 size = 6;
}
message ListSettlementOrdersResponse {
    repeated SettlementOrderProto settlementOrders = 1;
    int32 totalCount = 2;
    int32 page = 3;
    int32 size = 4;
}
message CreateSettlementOrderRequest {
    string settlementNo = 1;
    string orderNo = 2;
    int64 merchantId = 3;
    string merchantName = 4;
    double orderAmount = 5;
    double settlementAmount = 6;
    SettlementChannel channel = 7;
    string description = 8;
}
message CreateSettlementOrderResponse { SettlementOrderProto settlementOrder = 1; }
message ConfirmSettlementRequest { int64 id = 1; }
message ConfirmSettlementResponse { bool success = 1; }
message ProcessSettlementRequest { int64 id = 1; }
message ProcessSettlementResponse { bool success = 1; }
message CompleteSettlementRequest { int64 id = 1; }
message CompleteSettlementResponse { bool success = 1; }
message FailSettlementRequest {
    int64 id = 1;
    string reason = 2;
}
message FailSettlementResponse { bool success = 1; }
message CancelSettlementRequest {
    int64 id = 1;
    string reason = 2;
}
message CancelSettlementResponse { bool success = 1; }
message ApplyRefundRequest {
    int64 id = 1;
    double amount = 2;
    string reason = 3;
}
message ApplyRefundResponse { bool success = 1; }

message LogisticsSettlementProto {
    int64 id = 1;
    string settlementNo = 2;
    string trackingNo = 3;
    string orderNo = 4;
    int64 carrierId = 5;
    string carrierName = 6;
    double freight = 7;
    double handlingFee = 8;
    double discount = 9;
    double totalAmount = 10;
    LogisticsSettlementStatus status = 11;
    string billingCycle = 12;
    int64 settlementDate = 13;
    int64 paidAt = 14;
    string remark = 15;
    int64 createdAt = 16;
    int64 updatedAt = 17;
}
message GetLogisticsSettlementRequest { int64 id = 1; }
message GetLogisticsSettlementResponse { LogisticsSettlementProto logisticsSettlement = 1; }
message ListLogisticsSettlementsRequest {
    LogisticsSettlementStatus status = 1;
    int64 carrierId = 2;
    int32 page = 3;
    int32 size = 4;
}
message ListLogisticsSettlementsResponse {
    repeated LogisticsSettlementProto logisticsSettlements = 1;
    int32 totalCount = 2;
    int32 page = 3;
    int32 size = 4;
}
message CreateLogisticsSettlementRequest {
    string settlementNo = 1;
    string trackingNo = 2;
    string orderNo = 3;
    int64 carrierId = 4;
    string carrierName = 5;
    double freight = 6;
    double handlingFee = 7;
    string billingCycle = 8;
}
message CreateLogisticsSettlementResponse { LogisticsSettlementProto logisticsSettlement = 1; }
message ConfirmLogisticsSettlementRequest { int64 id = 1; }
message ConfirmLogisticsSettlementResponse { bool success = 1; }
message CompleteLogisticsSettlementRequest { int64 id = 1; }
message CompleteLogisticsSettlementResponse { bool success = 1; }

message SplitRuleProto {
    int64 id = 1;
    string ruleNo = 2;
    string ruleName = 3;
    SplitRuleType type = 4;
    int64 merchantId = 5;
    double ratio = 6;
    double fixedAmount = 7;
    double minAmount = 8;
    double maxAmount = 9;
    SplitRuleStatus status = 10;
    int32 priority = 11;
    int64 effectiveDate = 12;
    int64 expireDate = 13;
    int64 createdAt = 14;
    int64 updatedAt = 15;
}
message GetSplitRuleRequest { int64 id = 1; }
message GetSplitRuleResponse { SplitRuleProto splitRule = 1; }
message ListSplitRulesRequest {
    SplitRuleStatus status = 1;
    int64 merchantId = 2;
    int32 page = 3;
    int32 size = 4;
}
message ListSplitRulesResponse {
    repeated SplitRuleProto splitRules = 1;
    int32 totalCount = 2;
    int32 page = 3;
    int32 size = 4;
}
message CreateSplitRuleRequest {
    string ruleNo = 1;
    string ruleName = 2;
    SplitRuleType type = 3;
    int64 merchantId = 4;
    double ratio = 5;
    double fixedAmount = 6;
    int64 effectiveDate = 7;
    int64 expireDate = 8;
}
message CreateSplitRuleResponse { SplitRuleProto splitRule = 1; }
message UpdateSplitRuleRequest {
    int64 id = 1;
    string ruleName = 2;
    double ratio = 3;
    double fixedAmount = 4;
    SplitRuleStatus status = 5;
}
message UpdateSplitRuleResponse { SplitRuleProto splitRule = 1; }
message DeleteSplitRuleRequest { int64 id = 1; }
message DeleteSplitRuleResponse { bool success = 1; }

message ReconciliationRecordProto {
    int64 id = 1;
    string recordNo = 2;
    ReconciliationType type = 3;
    int64 reconcileDate = 4;
    ReconciliationChannel channel = 5;
    double totalAmount = 6;
    int32 totalCount = 7;
    double matchedAmount = 8;
    int32 matchedCount = 9;
    double unmatchedAmount = 10;
    int32 unmatchedCount = 11;
    ReconciliationStatus status = 12;
    string remark = 13;
    int64 createdAt = 14;
    int64 updatedAt = 15;
}
message GetReconciliationRecordRequest { int64 id = 1; }
message GetReconciliationRecordResponse { ReconciliationRecordProto record = 1; }
message ListReconciliationRecordsRequest {
    ReconciliationStatus status = 1;
    ReconciliationType type = 2;
    int32 page = 3;
    int32 size = 4;
}
message ListReconciliationRecordsResponse {
    repeated ReconciliationRecordProto records = 1;
    int32 totalCount = 2;
    int32 page = 3;
    int32 size = 4;
}
message CreateReconciliationRecordRequest {
    string recordNo = 1;
    ReconciliationType type = 2;
    ReconciliationChannel channel = 3;
    double totalAmount = 4;
    int32 totalCount = 5;
    string remark = 6;
}
message CreateReconciliationRecordResponse { ReconciliationRecordProto record = 1; }
