    double remainingAmount = 10;
    string invoiceDate = 11;
    string dueDate = 12;
    int32 creditTerm = 13;
    string status = 14;
    string currency = 15;
    double exchangeRate = 16;
    double originalAmount = 17;
    string description = 18;
    int64 createdAt = 19;
    int64 updatedAt = 20;
}

message GetAccountsReceivableRequest { int64 id = 1; }
message GetAccountsReceivableResponse { AccountsReceivableProto ar = 1; }
message ListAccountsReceivablesRequest {
    string status = 1;
    int64 customerId = 2;
    int32 page = 3;
    int32 size = 4;
}
message ListAccountsReceivablesResponse {
    repeated AccountsReceivableProto ars = 1;
    int32 totalCount = 2;
    int32 page = 3;
    int32 size = 4;
}
message CreateAccountsReceivableRequest {
    string arCode = 1;
    int64 customerId = 2;
    string customerName = 3;
    double amount = 4;
    string dueDate = 5;
    string description = 6;
}
message CreateAccountsReceivableResponse { AccountsReceivableProto ar = 1; }
message ReceiveArRequest {
    int64 id = 1;
    double amount = 2;
}
message ReceiveArResponse { bool success = 1; }
message WriteOffArRequest {
    int64 id = 1;
    string reason = 2;
}
message WriteOffArResponse { bool success = 1; }

// ===== Accounts Payable =====
message AccountsPayableProto {
    int64 id = 1;
    string apCode = 2;
    int64 supplierId = 3;
    string supplierName = 4;
    string businessType = 5;
    string relatedDocumentType = 6;
    string relatedDocumentNo = 7;
    double amount = 8;
    double paidAmount = 9;
    double remainingAmount = 10;
    string invoiceDate = 11;
    string dueDate = 12;
    int32 creditTerm = 13;
    string status = 14;
    string currency = 15;
    double exchangeRate = 16;
    double originalAmount = 17;
    string description = 18;
    int64 createdAt = 19;
    int64 updatedAt = 20;
}

message GetAccountsPayableRequest { int64 id = 1; }
message GetAccountsPayableResponse { AccountsPayableProto ap = 1; }
message ListAccountsPayablesRequest {
    string status = 1;
    int64 supplierId = 2;
    int32 page = 3;
    int32 size = 4;
}
message ListAccountsPayablesResponse {
    repeated AccountsPayableProto aps = 1;
    int32 totalCount = 2;
    int32 page = 3;
    int32 size = 4;
}
message CreateAccountsPayableRequest {
    string apCode = 1;
    int64 supplierId = 2;
    string supplierName = 3;
    double amount = 4;
    string dueDate = 5;
    string description = 6;
}
message CreateAccountsPayableResponse { AccountsPayableProto ap = 1; }
message PayApRequest {
    int64 id = 1;
    double amount = 2;
}
message PayApResponse { bool success = 1; }
message WriteOffApRequest {
    int64 id = 1;
    string reason = 2;
}
message WriteOffApResponse { bool success = 1; }

// ===== General Ledger =====
message GeneralLedgerEntryProto {
    int64 id = 1;
    int64 subjectId = 2;
    string subjectCode = 3;
    string subjectName = 4;
    double debitAmount = 5;
    double creditAmount = 6;
    string voucherNo = 7;
    string voucherDate = 8;
    string description = 9;
}
message GeneralLedgerProto {
    int64 id = 1;
    string ledgerNo = 2;
    int32 periodYear = 3;
    int32 periodMonth = 4;
    string status = 5;
    double totalDebit = 6;
    double totalCredit = 7;
    string createdBy = 8;
    int64 createdAt = 9;
    int64 updatedAt = 10;
    repeated GeneralLedgerEntryProto entries = 11;
}

message GetGeneralLedgerRequest { int64 id = 1; }
message GetGeneralLedgerResponse { GeneralLedgerProto ledger = 1; }
message ListGeneralLedgersRequest {
    int32 periodYear = 1;
    int32 periodMonth = 2;
    string status = 3;
    int32 page = 4;
    int32 size = 5;
}
message ListGeneralLedgersResponse {
    repeated GeneralLedgerProto ledgers = 1;
    int32 totalCount = 2;
    int32 page = 3;
    int32 size = 4;
}
message PostLedgerRequest { int64 id = 1; }
message PostLedgerResponse { bool success = 1; }
message CloseLedgerRequest {
    int32 periodYear = 1;
    int32 periodMonth = 2;
}
message CloseLedgerResponse { bool success = 1; }

// ===== Budget =====
