// ===== Cost Variance =====
message CostVarianceProto {
    int64 id = 1;
    string productCode = 2;
    string productName = 3;
    string productionOrderNo = 4;
    string varianceDate = 5;
    double standardMaterialCost = 6;
    double actualMaterialCost = 7;
    double materialVariance = 8;
    double standardLaborCost = 9;
    double actualLaborCost = 10;
    double laborVariance = 11;
    double standardOverheadCost = 12;
    double actualOverheadCost = 13;
    double overheadVariance = 14;
    double standardTotalCost = 15;
    double actualTotalCost = 16;
    double totalVariance = 17;
    string varianceType = 18;
    string analysis = 19;
    int64 createdAt = 20;
    int64 updatedAt = 21;
}
message GetCostVarianceRequest { int64 id = 1; }
message GetCostVarianceResponse { CostVarianceProto variance = 1; }
message ListCostVariancesRequest {
    string productCode = 1;
    string startDate = 2;
    string endDate = 3;
    int32 page = 4;
    int32 size = 5;
}
message ListCostVariancesResponse {
    repeated CostVarianceProto variances = 1;
    int32 totalCount = 2;
    int32 page = 3;
    int32 size = 4;
}

// ===== Exchange Rate =====
message ExchangeRateProto {
    int64 id = 1;
    string sourceCurrency = 2;
    string targetCurrency = 3;
    double rate = 4;
    string effectiveDate = 5;
    string rateType = 6;
    bool isActive = 7;
    int64 createdAt = 8;
    int64 updatedAt = 9;
}
message GetExchangeRateRequest { int64 id = 1; }
message GetExchangeRateResponse { ExchangeRateProto exchangeRate = 1; }
message ListExchangeRatesRequest {
    string sourceCurrency = 1;
    string targetCurrency = 2;
    string rateType = 3;
    int32 page = 4;
    int32 size = 5;
}
message ListExchangeRatesResponse {
    repeated ExchangeRateProto exchangeRates = 1;
    int32 totalCount = 2;
    int32 page = 3;
    int32 size = 4;
}
message CreateExchangeRateRequest {
    string sourceCurrency = 1;
    string targetCurrency = 2;
    double rate = 3;
    string effectiveDate = 4;
    string rateType = 5;
}
message CreateExchangeRateResponse { ExchangeRateProto exchangeRate = 1; }
message UpdateExchangeRateRequest {
    int64 id = 1;
    double rate = 2;
    bool isActive = 3;
}
message UpdateExchangeRateResponse { ExchangeRateProto exchangeRate = 1; }

