syntax = "proto3";

package com.metawebthree.erp.generated.rpc;

option java_multiple_files = true;

import "shared/google/type/money.proto";

service FinanceService {
    rpc getAccount(GetAccountRequest) returns (GetAccountResponse);
    rpc listAccounts(ListAccountsRequest) returns (ListAccountsResponse);
    rpc createAccount(CreateAccountRequest) returns (CreateAccountResponse);
    rpc updateAccount(UpdateAccountRequest) returns (UpdateAccountResponse);
    rpc deleteAccount(DeleteAccountRequest) returns (DeleteAccountResponse);
    rpc freezeAccount(FreezeAccountRequest) returns (FreezeAccountResponse);
    rpc unfreezeAccount(UnfreezeAccountRequest) returns (UnfreezeAccountResponse);
    rpc closeAccount(CloseAccountRequest) returns (CloseAccountResponse);
    rpc creditAccount(CreditAccountRequest) returns (CreditAccountResponse);
    rpc debitAccount(DebitAccountRequest) returns (DebitAccountResponse);
    rpc getAccountSubject(GetAccountSubjectRequest) returns (GetAccountSubjectResponse);
    rpc listAccountSubjects(ListAccountSubjectsRequest) returns (ListAccountSubjectsResponse);
    rpc createAccountSubject(CreateAccountSubjectRequest) returns (CreateAccountSubjectResponse);
    rpc updateAccountSubject(UpdateAccountSubjectRequest) returns (UpdateAccountSubjectResponse);
    rpc deleteAccountSubject(DeleteAccountSubjectRequest) returns (DeleteAccountSubjectResponse);
    rpc getVoucher(GetVoucherRequest) returns (GetVoucherResponse);
    rpc listVouchers(ListVouchersRequest) returns (ListVouchersResponse);
    rpc createVoucher(CreateVoucherRequest) returns (CreateVoucherResponse);
    rpc updateVoucher(UpdateVoucherRequest) returns (UpdateVoucherResponse);
    rpc deleteVoucher(DeleteVoucherRequest) returns (DeleteVoucherResponse);
    rpc approveVoucher(ApproveVoucherRequest) returns (ApproveVoucherResponse);
    rpc rejectVoucher(RejectVoucherRequest) returns (RejectVoucherResponse);
    rpc postVoucher(PostVoucherRequest) returns (PostVoucherResponse);
    rpc getGeneralLedger(GetGeneralLedgerRequest) returns (GetGeneralLedgerResponse);
    rpc listGeneralLedgers(ListGeneralLedgersRequest) returns (ListGeneralLedgersResponse);
    rpc postLedger(PostLedgerRequest) returns (PostLedgerResponse);
    rpc closeLedger(CloseLedgerRequest) returns (CloseLedgerResponse);
}

enum AccountType {
    ACCOUNT_TYPE_UNSPECIFIED = 0;
    ACCOUNT_TYPE_ASSET = 1;
    ACCOUNT_TYPE_LIABILITY = 2;
    ACCOUNT_TYPE_EQUITY = 3;
    ACCOUNT_TYPE_REVENUE = 4;
    ACCOUNT_TYPE_EXPENSE = 5;
}

enum AccountStatus {
    ACCOUNT_STATUS_UNSPECIFIED = 0;
    ACCOUNT_STATUS_ACTIVE = 1;
    ACCOUNT_STATUS_FROZEN = 2;
    ACCOUNT_STATUS_CLOSED = 3;
}

enum SubjectDirection {
    SUBJECT_DIRECTION_UNSPECIFIED = 0;
    SUBJECT_DIRECTION_DEBIT = 1;
    SUBJECT_DIRECTION_CREDIT = 2;
}

enum SubjectStatus {
    SUBJECT_STATUS_UNSPECIFIED = 0;
    SUBJECT_STATUS_ACTIVE = 1;
    SUBJECT_STATUS_INACTIVE = 2;
}

enum VoucherType {
    VOUCHER_TYPE_UNSPECIFIED = 0;
    VOUCHER_TYPE_PAYMENT = 1;
    VOUCHER_TYPE_RECEIPT = 2;
    VOUCHER_TYPE_TRANSFER = 3;
}

enum VoucherStatus {
    VOUCHER_STATUS_UNSPECIFIED = 0;
    VOUCHER_STATUS_DRAFT = 1;
    VOUCHER_STATUS_APPROVED = 2;
    VOUCHER_STATUS_POSTED = 3;
    VOUCHER_STATUS_CANCELLED = 4;
}

enum LedgerStatus {
    LEDGER_STATUS_UNSPECIFIED = 0;
    LEDGER_STATUS_OPEN = 1;
    LEDGER_STATUS_CLOSED = 2;
    LEDGER_STATUS_POSTED = 3;
}

message AccountProto {
    int64 id = 1;
    string accountNo = 2;
    string accountName = 3;
    AccountType type = 4;
    google.type.Money balance = 5;
    AccountStatus status = 6;
    int64 createdAt = 7;
    int64 updatedAt = 8;
}

message GetAccountRequest { int64 id = 1; }
message GetAccountResponse { AccountProto account = 1; }
message ListAccountsRequest {
    AccountStatus status = 1;
    AccountType type = 2;
    int32 page = 3;
    int32 size = 4;
}
message ListAccountsResponse {
    repeated AccountProto accounts = 1;
    int32 totalCount = 2;
    int32 page = 3;
    int32 size = 4;
}
message CreateAccountRequest {
    string accountNo = 1;
    string accountName = 2;
    AccountType type = 3;
    google.type.Money balance = 4;
}
message CreateAccountResponse { AccountProto account = 1; }
message UpdateAccountRequest {
    int64 id = 1;
    string accountName = 2;
}
message UpdateAccountResponse { AccountProto account = 1; }
message DeleteAccountRequest { int64 id = 1; }
message DeleteAccountResponse { bool success = 1; }
message FreezeAccountRequest { int64 id = 1; }
message FreezeAccountResponse { bool success = 1; }
message UnfreezeAccountRequest { int64 id = 1; }
message UnfreezeAccountResponse { bool success = 1; }
message CloseAccountRequest { int64 id = 1; }
message CloseAccountResponse { bool success = 1; }
message CreditAccountRequest {
    int64 id = 1;
    google.type.Money amount = 2;
}
message CreditAccountResponse { bool success = 1; }
message DebitAccountRequest {
    int64 id = 1;
    google.type.Money amount = 2;
}
message DebitAccountResponse { bool success = 1; }

message AccountSubjectProto {
    int64 id = 1;
    string subjectCode = 2;
    string subjectName = 3;
    SubjectDirection direction = 4;
    int64 parentId = 5;
    int32 level = 6;
    SubjectStatus status = 7;
    google.type.Money balance = 8;
    int64 createdAt = 9;
    int64 updatedAt = 10;
}

message GetAccountSubjectRequest { int64 id = 1; }
message GetAccountSubjectResponse { AccountSubjectProto subject = 1; }
message ListAccountSubjectsRequest {
    SubjectStatus status = 1;
    int32 page = 2;
    int32 size = 3;
}
message ListAccountSubjectsResponse {
    repeated AccountSubjectProto subjects = 1;
    int32 totalCount = 2;
    int32 page = 3;
    int32 size = 4;
}
message CreateAccountSubjectRequest {
    string subjectCode = 1;
    string subjectName = 2;
    SubjectDirection direction = 3;
    int64 parentId = 4;
    int32 level = 5;
}
message CreateAccountSubjectResponse { AccountSubjectProto subject = 1; }
message UpdateAccountSubjectRequest {
    int64 id = 1;
    string subjectName = 2;
    SubjectStatus status = 3;
}
message UpdateAccountSubjectResponse { AccountSubjectProto subject = 1; }
message DeleteAccountSubjectRequest { int64 id = 1; }
message DeleteAccountSubjectResponse { bool success = 1; }

message VoucherLineProto {
    int64 subjectId = 1;
    google.type.Money debitAmount = 2;
    google.type.Money creditAmount = 3;
    string foreignCurrency = 4;
    google.type.Money foreignDebitAmount = 5;
    google.type.Money foreignCreditAmount = 6;
}

message VoucherProto {
    int64 id = 1;
    string voucherNo = 2;
    VoucherType type = 3;
    int64 voucherDate = 4;
    string description = 5;
    VoucherStatus status = 6;
    string currency = 7;
    double exchangeRate = 8;
    string createdBy = 9;
    string approvedBy = 10;
    int64 createdAt = 11;
    int64 updatedAt = 12;
    repeated VoucherLineProto lines = 13;
}

message GetVoucherRequest { int64 id = 1; }
message GetVoucherResponse { VoucherProto voucher = 1; }
message ListVouchersRequest {
    VoucherStatus status = 1;
    VoucherType type = 2;
    int64 startDate = 3;
    int64 endDate = 4;
    int32 page = 5;
    int32 size = 6;
}
message ListVouchersResponse {
    repeated VoucherProto vouchers = 1;
    int32 totalCount = 2;
    int32 page = 3;
    int32 size = 4;
}
message CreateVoucherRequest {
    VoucherType type = 1;
    int64 voucherDate = 2;
    string description = 3;
    string currency = 4;
    double exchangeRate = 5;
    string createdBy = 6;
    repeated VoucherLineProto lines = 7;
}
message CreateVoucherResponse { VoucherProto voucher = 1; }
message UpdateVoucherRequest {
    int64 id = 1;
    string description = 2;
    repeated VoucherLineProto lines = 3;
}
message UpdateVoucherResponse { VoucherProto voucher = 1; }
message DeleteVoucherRequest { int64 id = 1; }
message DeleteVoucherResponse { bool success = 1; }
message ApproveVoucherRequest {
    int64 id = 1;
    string approvedBy = 2;
}
message ApproveVoucherResponse { bool success = 1; }
message RejectVoucherRequest {
    int64 id = 1;
    string reason = 2;
}
message RejectVoucherResponse { bool success = 1; }
message PostVoucherRequest { int64 id = 1; }
message PostVoucherResponse { bool success = 1; }

message GeneralLedgerEntryProto {
    int64 id = 1;
    int64 subjectId = 2;
    string subjectCode = 3;
    string subjectName = 4;
    google.type.Money debitAmount = 5;
    google.type.Money creditAmount = 6;
    string voucherNo = 7;
    int64 voucherDate = 8;
    string description = 9;
}
message GeneralLedgerProto {
    int64 id = 1;
    string ledgerNo = 2;
    int32 periodYear = 3;
    int32 periodMonth = 4;
    LedgerStatus status = 5;
    google.type.Money totalDebit = 6;
    google.type.Money totalCredit = 7;
    string createdBy = 8;
    int64 createdAt = 9;
    int64 updatedAt = 10;
    repeated GeneralLedgerEntryProto entries = 11;
}

message GetGeneralLedgerRequest { int64 id = 1; }
message GetGeneralLedgerResponse { GeneralLedgerProto ledger = 1; }
message ListGeneralLedgersRequest {
    int32 periodYear = 1;
    int32 periodMonth = 2;
    LedgerStatus status = 3;
    int32 page = 4;
    int32 size = 5;
}
message ListGeneralLedgersResponse {
    repeated GeneralLedgerProto ledgers = 1;
    int32 totalCount = 2;
    int32 page = 3;
    int32 size = 4;
}
message PostLedgerRequest { int64 id = 1; }
message PostLedgerResponse { bool success = 1; }
message CloseLedgerRequest {
    int32 periodYear = 1;
    int32 periodMonth = 2;
}
message CloseLedgerResponse { bool success = 1; }
