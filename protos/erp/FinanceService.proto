message BudgetProto {
    int64 id = 1;
    string budgetCode = 2;
    string budgetName = 3;
    string type = 4;
    string period = 5;
    int64 departmentId = 6;
    string departmentName = 7;
    string status = 8;
    double totalAmount = 9;
    double usedAmount = 10;
    double adjustedAmount = 11;
    string currency = 12;
    string remark = 13;
    int64 createdAt = 14;
    int64 updatedAt = 15;
    repeated BudgetLineProto lines = 16;
}

message GetBudgetRequest { int64 id = 1; }
message GetBudgetResponse { BudgetProto budget = 1; }
message ListBudgetsRequest {
    string status = 1;
    string type = 2;
    int64 departmentId = 3;
    int32 page = 4;
    int32 size = 5;
}
message ListBudgetsResponse {
    repeated BudgetProto budgets = 1;
    int32 totalCount = 2;
    int32 page = 3;
    int32 size = 4;
}
message CreateBudgetRequest {
    string budgetCode = 1;
    string budgetName = 2;
    string type = 3;
    string period = 4;
    int64 departmentId = 5;
    double totalAmount = 6;
    string currency = 7;
    string remark = 8;
    repeated BudgetLineProto lines = 9;
}
message CreateBudgetResponse { BudgetProto budget = 1; }
message UpdateBudgetRequest {
    int64 id = 1;
    string budgetName = 2;
    string remark = 3;
}
message UpdateBudgetResponse { BudgetProto budget = 1; }
message DeleteBudgetRequest { int64 id = 1; }
message DeleteBudgetResponse { bool success = 1; }
message AdjustBudgetRequest {
    int64 budgetId = 1;
    string adjustmentNo = 2;
    string type = 3;
    string subjectCode = 4;
    double amount = 5;
    string reason = 6;
}
message AdjustBudgetResponse { bool success = 1; }

// ===== Bank Account =====
message BankAccountProto {
    int64 id = 1;
    string accountCode = 2;
    string accountName = 3;
    string bankName = 4;
    string accountNumber = 5;
    string accountType = 6;
    string status = 7;
    double balance = 8;
    double frozenAmount = 9;
    string currency = 10;
    string remark = 11;
    int64 createdAt = 12;
    int64 updatedAt = 13;
}

message GetBankAccountRequest { int64 id = 1; }
message GetBankAccountResponse { BankAccountProto bankAccount = 1; }
message ListBankAccountsRequest {
    string status = 1;
    int32 page = 2;
    int32 size = 3;
}
message ListBankAccountsResponse {
    repeated BankAccountProto bankAccounts = 1;
    int32 totalCount = 2;
    int32 page = 3;
    int32 size = 4;
}
message CreateBankAccountRequest {
    string accountCode = 1;
    string accountName = 2;
    string bankName = 3;
    string accountNumber = 4;
    string currency = 5;
}
message CreateBankAccountResponse { BankAccountProto bankAccount = 1; }
message UpdateBankAccountRequest {
    int64 id = 1;
    string accountName = 2;
    string status = 3;
}
message UpdateBankAccountResponse { BankAccountProto bankAccount = 1; }

// ===== Cash Plan =====
