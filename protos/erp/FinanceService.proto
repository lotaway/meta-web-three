syntax = "proto3";

package com.metawebthree.erp.generated.rpc;

option java_multiple_files = true;

import "shared/google/type/money.proto";

service FinanceService {
    // Account
    rpc getAccount(GetAccountRequest) returns (GetAccountResponse);
    rpc listAccounts(ListAccountsRequest) returns (ListAccountsResponse);
    rpc createAccount(CreateAccountRequest) returns (CreateAccountResponse);
    rpc updateAccount(UpdateAccountRequest) returns (UpdateAccountResponse);
    rpc deleteAccount(DeleteAccountRequest) returns (DeleteAccountResponse);
    rpc freezeAccount(FreezeAccountRequest) returns (FreezeAccountResponse);
    rpc unfreezeAccount(UnfreezeAccountRequest) returns (UnfreezeAccountResponse);
    rpc closeAccount(CloseAccountRequest) returns (CloseAccountResponse);
    rpc creditAccount(CreditAccountRequest) returns (CreditAccountResponse);
    rpc debitAccount(DebitAccountRequest) returns (DebitAccountResponse);

    // AccountSubject
    rpc getAccountSubject(GetAccountSubjectRequest) returns (GetAccountSubjectResponse);
    rpc listAccountSubjects(ListAccountSubjectsRequest) returns (ListAccountSubjectsResponse);
    rpc createAccountSubject(CreateAccountSubjectRequest) returns (CreateAccountSubjectResponse);
    rpc updateAccountSubject(UpdateAccountSubjectRequest) returns (UpdateAccountSubjectResponse);
    rpc deleteAccountSubject(DeleteAccountSubjectRequest) returns (DeleteAccountSubjectResponse);

    // Voucher
    rpc getVoucher(GetVoucherRequest) returns (GetVoucherResponse);
    rpc listVouchers(ListVouchersRequest) returns (ListVouchersResponse);
    rpc createVoucher(CreateVoucherRequest) returns (CreateVoucherResponse);
    rpc updateVoucher(UpdateVoucherRequest) returns (UpdateVoucherResponse);
    rpc deleteVoucher(DeleteVoucherRequest) returns (DeleteVoucherResponse);
    rpc approveVoucher(ApproveVoucherRequest) returns (ApproveVoucherResponse);
    rpc rejectVoucher(RejectVoucherRequest) returns (RejectVoucherResponse);
    rpc postVoucher(PostVoucherRequest) returns (PostVoucherResponse);

    // Accounts Receivable
    rpc getAccountsReceivable(GetAccountsReceivableRequest) returns (GetAccountsReceivableResponse);
    rpc listAccountsReceivables(ListAccountsReceivablesRequest) returns (ListAccountsReceivablesResponse);
    rpc createAccountsReceivable(CreateAccountsReceivableRequest) returns (CreateAccountsReceivableResponse);
    rpc receiveAr(ReceiveArRequest) returns (ReceiveArResponse);
    rpc writeOffAr(WriteOffArRequest) returns (WriteOffArResponse);

    // Accounts Payable
    rpc getAccountsPayable(GetAccountsPayableRequest) returns (GetAccountsPayableResponse);
    rpc listAccountsPayables(ListAccountsPayablesRequest) returns (ListAccountsPayablesResponse);
    rpc createAccountsPayable(CreateAccountsPayableRequest) returns (CreateAccountsPayableResponse);
    rpc payAp(PayApRequest) returns (PayApResponse);
    rpc writeOffAp(WriteOffApRequest) returns (WriteOffApResponse);

    // General Ledger
    rpc getGeneralLedger(GetGeneralLedgerRequest) returns (GetGeneralLedgerResponse);
    rpc listGeneralLedgers(ListGeneralLedgersRequest) returns (ListGeneralLedgersResponse);
    rpc postLedger(PostLedgerRequest) returns (PostLedgerResponse);
    rpc closeLedger(CloseLedgerRequest) returns (CloseLedgerResponse);

    // Budget
    rpc getBudget(GetBudgetRequest) returns (GetBudgetResponse);
    rpc listBudgets(ListBudgetsRequest) returns (ListBudgetsResponse);
    rpc createBudget(CreateBudgetRequest) returns (CreateBudgetResponse);
    rpc updateBudget(UpdateBudgetRequest) returns (UpdateBudgetResponse);
    rpc deleteBudget(DeleteBudgetRequest) returns (DeleteBudgetResponse);
    rpc adjustBudget(AdjustBudgetRequest) returns (AdjustBudgetResponse);

    // Cash Management
    rpc getBankAccount(GetBankAccountRequest) returns (GetBankAccountResponse);
    rpc listBankAccounts(ListBankAccountsRequest) returns (ListBankAccountsResponse);
    rpc createBankAccount(CreateBankAccountRequest) returns (CreateBankAccountResponse);
    rpc updateBankAccount(UpdateBankAccountRequest) returns (UpdateBankAccountResponse);
    rpc getCashPlan(GetCashPlanRequest) returns (GetCashPlanResponse);
    rpc listCashPlans(ListCashPlansRequest) returns (ListCashPlansResponse);
    rpc createCashPlan(CreateCashPlanRequest) returns (CreateCashPlanResponse);
    rpc createCashTransfer(CreateCashTransferRequest) returns (CreateCashTransferResponse);
    rpc approveCashTransfer(ApproveCashTransferRequest) returns (ApproveCashTransferResponse);
    rpc executeCashTransfer(ExecuteCashTransferRequest) returns (ExecuteCashTransferResponse);

    // Cost Accounting
    rpc getCostCenter(GetCostCenterRequest) returns (GetCostCenterResponse);
    rpc listCostCenters(ListCostCentersRequest) returns (ListCostCentersResponse);
    rpc createCostCenter(CreateCostCenterRequest) returns (CreateCostCenterResponse);
    rpc updateCostCenter(UpdateCostCenterRequest) returns (UpdateCostCenterResponse);
    rpc getStandardCost(GetStandardCostRequest) returns (GetStandardCostResponse);
    rpc listStandardCosts(ListStandardCostsRequest) returns (ListStandardCostsResponse);
    rpc createStandardCost(CreateStandardCostRequest) returns (CreateStandardCostResponse);
    rpc getActualCost(GetActualCostRequest) returns (GetActualCostResponse);
    rpc listActualCosts(ListActualCostsRequest) returns (ListActualCostsResponse);
    rpc createActualCost(CreateActualCostRequest) returns (CreateActualCostResponse);
    rpc getCostVariance(GetCostVarianceRequest) returns (GetCostVarianceResponse);
    rpc listCostVariances(ListCostVariancesRequest) returns (ListCostVariancesResponse);

    // Exchange Rate
    rpc getExchangeRate(GetExchangeRateRequest) returns (GetExchangeRateResponse);
    rpc listExchangeRates(ListExchangeRatesRequest) returns (ListExchangeRatesResponse);
    rpc createExchangeRate(CreateExchangeRateRequest) returns (CreateExchangeRateResponse);
    rpc updateExchangeRate(UpdateExchangeRateRequest) returns (UpdateExchangeRateResponse);

    // Financial Ratio
    rpc listFinancialRatios(ListFinancialRatiosRequest) returns (ListFinancialRatiosResponse);
    rpc getFinancialRatio(GetFinancialRatioRequest) returns (GetFinancialRatioResponse);
}

// ===== Account =====
message AccountProto {
    int64 id = 1;
    string accountNo = 2;
    string accountName = 3;
    string type = 4;
    double balance = 5;
    string status = 6;
    int64 createdAt = 7;
    int64 updatedAt = 8;
}

message GetAccountRequest { int64 id = 1; }
message GetAccountResponse { AccountProto account = 1; }
message ListAccountsRequest {
    string status = 1;
    string type = 2;
    int32 page = 3;
    int32 size = 4;
}
message ListAccountsResponse {
    repeated AccountProto accounts = 1;
    int32 totalCount = 2;
    int32 page = 3;
    int32 size = 4;
}
message CreateAccountRequest {
    string accountNo = 1;
    string accountName = 2;
    string type = 3;
    double balance = 4;
}
message CreateAccountResponse { AccountProto account = 1; }
message UpdateAccountRequest {
    int64 id = 1;
    string accountName = 2;
}
message UpdateAccountResponse { AccountProto account = 1; }
message DeleteAccountRequest { int64 id = 1; }
message DeleteAccountResponse { bool success = 1; }
message FreezeAccountRequest { int64 id = 1; }
message FreezeAccountResponse { bool success = 1; }
message UnfreezeAccountRequest { int64 id = 1; }
message UnfreezeAccountResponse { bool success = 1; }
message CloseAccountRequest { int64 id = 1; }
message CloseAccountResponse { bool success = 1; }
message CreditAccountRequest {
    int64 id = 1;
    double amount = 2;
}
message CreditAccountResponse { bool success = 1; }
message DebitAccountRequest {
    int64 id = 1;
    double amount = 2;
}
message DebitAccountResponse { bool success = 1; }

// ===== AccountSubject =====
message AccountSubjectProto {
    int64 id = 1;
    string subjectCode = 2;
    string subjectName = 3;
    string direction = 4;
    int64 parentId = 5;
    int32 level = 6;
    string status = 7;
    double balance = 8;
    int64 createdAt = 9;
    int64 updatedAt = 10;
}

message GetAccountSubjectRequest { int64 id = 1; }
message GetAccountSubjectResponse { AccountSubjectProto subject = 1; }
message ListAccountSubjectsRequest {
    string status = 1;
    int32 page = 2;
    int32 size = 3;
}
message ListAccountSubjectsResponse {
    repeated AccountSubjectProto subjects = 1;
    int32 totalCount = 2;
    int32 page = 3;
    int32 size = 4;
}
message CreateAccountSubjectRequest {
    string subjectCode = 1;
    string subjectName = 2;
    string direction = 3;
    int64 parentId = 4;
    int32 level = 5;
}
message CreateAccountSubjectResponse { AccountSubjectProto subject = 1; }
message UpdateAccountSubjectRequest {
    int64 id = 1;
    string subjectName = 2;
    string status = 3;
}
message UpdateAccountSubjectResponse { AccountSubjectProto subject = 1; }
message DeleteAccountSubjectRequest { int64 id = 1; }
message DeleteAccountSubjectResponse { bool success = 1; }

// ===== Voucher =====
message VoucherLineProto {
    int64 subjectId = 1;
    double debitAmount = 2;
    double creditAmount = 3;
    string foreignCurrency = 4;
    double foreignDebitAmount = 5;
    double foreignCreditAmount = 6;
}

message VoucherProto {
    int64 id = 1;
    string voucherNo = 2;
    string type = 3;
    string voucherDate = 4;
    string description = 5;
    string status = 6;
    string currency = 7;
    double exchangeRate = 8;
    string createdBy = 9;
    string approvedBy = 10;
    int64 createdAt = 11;
    int64 updatedAt = 12;
    repeated VoucherLineProto lines = 13;
}

message GetVoucherRequest { int64 id = 1; }
message GetVoucherResponse { VoucherProto voucher = 1; }
message ListVouchersRequest {
    string status = 1;
    string type = 2;
    string startDate = 3;
    string endDate = 4;
    int32 page = 5;
    int32 size = 6;
}
message ListVouchersResponse {
    repeated VoucherProto vouchers = 1;
    int32 totalCount = 2;
    int32 page = 3;
    int32 size = 4;
}
message CreateVoucherRequest {
    string type = 1;
    string voucherDate = 2;
    string description = 3;
    string currency = 4;
    double exchangeRate = 5;
    string createdBy = 6;
    repeated VoucherLineProto lines = 7;
}
message CreateVoucherResponse { VoucherProto voucher = 1; }
message UpdateVoucherRequest {
    int64 id = 1;
    string description = 2;
    repeated VoucherLineProto lines = 3;
}
message UpdateVoucherResponse { VoucherProto voucher = 1; }
message DeleteVoucherRequest { int64 id = 1; }
message DeleteVoucherResponse { bool success = 1; }
message ApproveVoucherRequest {
    int64 id = 1;
    string approvedBy = 2;
}
message ApproveVoucherResponse { bool success = 1; }
message RejectVoucherRequest {
    int64 id = 1;
    string reason = 2;
}
message RejectVoucherResponse { bool success = 1; }
message PostVoucherRequest { int64 id = 1; }
message PostVoucherResponse { bool success = 1; }

