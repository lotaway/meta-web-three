    int64 id = 1;
    string planCode = 2;
    string planName = 3;
    string type = 4;
    string period = 5;
    string startDate = 6;
    string endDate = 7;
    string status = 8;
    double totalAmount = 9;
    double inflowAmount = 10;
    double outflowAmount = 11;
    string currency = 12;
    int64 departmentId = 13;
    string departmentName = 14;
    string remark = 15;
    int64 createdAt = 16;
    int64 updatedAt = 17;
    repeated CashPlanLineProto lines = 18;
}
message GetCashPlanRequest { int64 id = 1; }
message GetCashPlanResponse { CashPlanProto cashPlan = 1; }
message ListCashPlansRequest {
    string status = 1;
    string type = 2;
    int32 page = 3;
    int32 size = 4;
}
message ListCashPlansResponse {
    repeated CashPlanProto cashPlans = 1;
