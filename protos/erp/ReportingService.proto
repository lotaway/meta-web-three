syntax = "proto3";

package com.metawebthree.erp.generated.rpc;

option java_multiple_files = true;

enum ReportType {
    REPORT_TYPE_UNSPECIFIED = 0;
    REPORT_TYPE_DAILY = 1;
    REPORT_TYPE_WEEKLY = 2;
    REPORT_TYPE_MONTHLY = 3;
    REPORT_TYPE_QUARTERLY = 4;
    REPORT_TYPE_YEARLY = 5;
}

enum ReportFrequency {
    REPORT_FREQUENCY_UNSPECIFIED = 0;
    REPORT_FREQUENCY_DAILY = 1;
    REPORT_FREQUENCY_WEEKLY = 2;
    REPORT_FREQUENCY_MONTHLY = 3;
    REPORT_FREQUENCY_QUARTERLY = 4;
}

enum ReportChannel {
    REPORT_CHANNEL_UNSPECIFIED = 0;
    REPORT_CHANNEL_EMAIL = 1;
    REPORT_CHANNEL_WEBHOOK = 2;
    REPORT_CHANNEL_SMS = 3;
}

service ReportingService {
    rpc getSalesReport(GetSalesReportRequest) returns (GetSalesReportResponse);
    rpc listSalesReports(ListSalesReportsRequest) returns (ListSalesReportsResponse);
    rpc generateSalesReport(GenerateSalesReportRequest) returns (GenerateSalesReportResponse);

    rpc getInventoryReport(GetInventoryReportRequest) returns (GetInventoryReportResponse);
    rpc listInventoryReports(ListInventoryReportsRequest) returns (ListInventoryReportsResponse);
    rpc generateInventoryReport(GenerateInventoryReportRequest) returns (GenerateInventoryReportResponse);

    rpc getFinancialReport(GetFinancialReportRequest) returns (GetFinancialReportResponse);
    rpc listFinancialReports(ListFinancialReportsRequest) returns (ListFinancialReportsResponse);
    rpc generateFinancialReport(GenerateFinancialReportRequest) returns (GenerateFinancialReportResponse);

    rpc getReportSubscription(GetReportSubscriptionRequest) returns (GetReportSubscriptionResponse);
    rpc listReportSubscriptions(ListReportSubscriptionsRequest) returns (ListReportSubscriptionsResponse);
    rpc createReportSubscription(CreateReportSubscriptionRequest) returns (CreateReportSubscriptionResponse);
    rpc updateReportSubscription(UpdateReportSubscriptionRequest) returns (UpdateReportSubscriptionResponse);
    rpc deleteReportSubscription(DeleteReportSubscriptionRequest) returns (DeleteReportSubscriptionResponse);
    rpc toggleReportSubscription(ToggleReportSubscriptionRequest) returns (ToggleReportSubscriptionResponse);
}

message SalesReportProto {
    int64 id = 1;
    string reportNo = 2;
    ReportType type = 3;
    int64 reportDate = 4;
    int64 startDate = 5;
    int64 endDate = 6;
    double totalSalesAmount = 7;
    int32 totalOrderCount = 8;
    double averageOrderAmount = 9;
    double grossProfit = 10;
    double profitMargin = 11;
    string categoryBreakdown = 12;
    string productRanking = 13;
    string channelBreakdown = 14;
    int64 createdAt = 15;
}
message GetSalesReportRequest { int64 id = 1; }
message GetSalesReportResponse { SalesReportProto salesReport = 1; }
message ListSalesReportsRequest {
    ReportType type = 1;
    int32 page = 2;
    int32 size = 3;
}
message ListSalesReportsResponse {
    repeated SalesReportProto salesReports = 1;
    int32 totalCount = 2;
    int32 page = 3;
    int32 size = 4;
}
message GenerateSalesReportRequest {
    ReportType type = 1;
    int64 startDate = 2;
    int64 endDate = 3;
}
message GenerateSalesReportResponse { SalesReportProto salesReport = 1; }

message InventoryReportProto {
    int64 id = 1;
    string reportNo = 2;
    ReportType type = 3;
    int64 reportDate = 4;
    double totalInventoryValue = 5;
    int32 totalSkuCount = 6;
    int32 totalQuantity = 7;
    double turnoverRate = 8;
    double slowMovingRate = 9;
    int32 slowMovingCount = 10;
    string warehouseBreakdown = 11;
    string categoryBreakdown = 12;
    string lowStockItems = 13;
    int64 createdAt = 14;
}
message GetInventoryReportRequest { int64 id = 1; }
message GetInventoryReportResponse { InventoryReportProto inventoryReport = 1; }
message ListInventoryReportsRequest {
    ReportType type = 1;
    int32 page = 2;
    int32 size = 3;
}
message ListInventoryReportsResponse {
    repeated InventoryReportProto inventoryReports = 1;
    int32 totalCount = 2;
    int32 page = 3;
    int32 size = 4;
}
message GenerateInventoryReportRequest {
    ReportType type = 1;
    string warehouseId = 2;
}
message GenerateInventoryReportResponse { InventoryReportProto inventoryReport = 1; }

message FinancialReportProto {
    int64 id = 1;
    string reportNo = 2;
    ReportType type = 3;
    int64 reportDate = 4;
    double totalReceivable = 5;
    double totalPayable = 6;
    double netReceivable = 7;
    string agingAnalysis = 8;
    double currentAssets = 9;
    double currentLiabilities = 10;
    double workingCapital = 11;
    double currentRatio = 12;
    string receivablesByCustomer = 13;
    string payablesBySupplier = 14;
    int64 createdAt = 15;
}
message GetFinancialReportRequest { int64 id = 1; }
message GetFinancialReportResponse { FinancialReportProto financialReport = 1; }
message ListFinancialReportsRequest {
    ReportType type = 1;
    int32 page = 2;
    int32 size = 3;
}
message ListFinancialReportsResponse {
    repeated FinancialReportProto financialReports = 1;
    int32 totalCount = 2;
    int32 page = 3;
    int32 size = 4;
}
message GenerateFinancialReportRequest {
    ReportType type = 1;
    int64 reportDate = 2;
}
message GenerateFinancialReportResponse { FinancialReportProto financialReport = 1; }

message ReportSubscriptionProto {
    int64 id = 1;
    int64 userId = 2;
    string userName = 3;
    ReportType reportType = 4;
    ReportFrequency frequency = 5;
    string cronExpression = 6;
    ReportChannel channel = 7;
    string recipient = 8;
    string webhookUrl = 9;
    bool enabled = 10;
    int64 nextSendTime = 11;
    int64 lastSendTime = 12;
    int64 createdAt = 13;
    int64 updatedAt = 14;
}
message GetReportSubscriptionRequest { int64 id = 1; }
message GetReportSubscriptionResponse { ReportSubscriptionProto subscription = 1; }
message ListReportSubscriptionsRequest {
    int64 userId = 1;
    int32 page = 2;
    int32 size = 3;
}
message ListReportSubscriptionsResponse {
    repeated ReportSubscriptionProto subscriptions = 1;
    int32 totalCount = 2;
    int32 page = 3;
    int32 size = 4;
}
message CreateReportSubscriptionRequest {
    int64 userId = 1;
    ReportType reportType = 2;
    ReportFrequency frequency = 3;
    ReportChannel channel = 4;
    string recipient = 5;
}
message CreateReportSubscriptionResponse { ReportSubscriptionProto subscription = 1; }
message UpdateReportSubscriptionRequest {
    int64 id = 1;
    ReportFrequency frequency = 2;
    string recipient = 3;
}
message UpdateReportSubscriptionResponse { ReportSubscriptionProto subscription = 1; }
message DeleteReportSubscriptionRequest { int64 id = 1; }
message DeleteReportSubscriptionResponse { bool success = 1; }
message ToggleReportSubscriptionRequest {
    int64 id = 1;
    bool enabled = 2;
}
message ToggleReportSubscriptionResponse { bool success = 1; }
