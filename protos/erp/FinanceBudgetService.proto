syntax = "proto3";

package com.metawebthree.erp.generated.rpc;

option java_multiple_files = true;

import "shared/google/type/money.proto";

service FinanceBudgetService {
    rpc getBudget(GetBudgetRequest) returns (GetBudgetResponse);
    rpc listBudgets(ListBudgetsRequest) returns (ListBudgetsResponse);
    rpc createBudget(CreateBudgetRequest) returns (CreateBudgetResponse);
    rpc updateBudget(UpdateBudgetRequest) returns (UpdateBudgetResponse);
    rpc deleteBudget(DeleteBudgetRequest) returns (DeleteBudgetResponse);
    rpc adjustBudget(AdjustBudgetRequest) returns (AdjustBudgetResponse);
    rpc getBankAccount(GetBankAccountRequest) returns (GetBankAccountResponse);
    rpc listBankAccounts(ListBankAccountsRequest) returns (ListBankAccountsResponse);
    rpc createBankAccount(CreateBankAccountRequest) returns (CreateBankAccountResponse);
    rpc updateBankAccount(UpdateBankAccountRequest) returns (UpdateBankAccountResponse);
    rpc getCashPlan(GetCashPlanRequest) returns (GetCashPlanResponse);
    rpc listCashPlans(ListCashPlansRequest) returns (ListCashPlansResponse);
    rpc createCashPlan(CreateCashPlanRequest) returns (CreateCashPlanResponse);
    rpc createCashTransfer(CreateCashTransferRequest) returns (CreateCashTransferResponse);
    rpc approveCashTransfer(ApproveCashTransferRequest) returns (ApproveCashTransferResponse);
    rpc executeCashTransfer(ExecuteCashTransferRequest) returns (ExecuteCashTransferResponse);
}

enum BudgetType {
    BUDGET_TYPE_UNSPECIFIED = 0;
    BUDGET_TYPE_ANNUAL = 1;
    BUDGET_TYPE_QUARTERLY = 2;
    BUDGET_TYPE_MONTHLY = 3;
}

enum BudgetStatus {
    BUDGET_STATUS_UNSPECIFIED = 0;
    BUDGET_STATUS_DRAFT = 1;
    BUDGET_STATUS_APPROVED = 2;
    BUDGET_STATUS_ACTIVE = 3;
    BUDGET_STATUS_CLOSED = 4;
}

enum BankAccountStatus {
    BANK_ACCOUNT_STATUS_UNSPECIFIED = 0;
    BANK_ACCOUNT_STATUS_ACTIVE = 1;
    BANK_ACCOUNT_STATUS_FROZEN = 2;
    BANK_ACCOUNT_STATUS_CLOSED = 3;
}

enum CashPlanStatus {
    CASH_PLAN_STATUS_UNSPECIFIED = 0;
    CASH_PLAN_STATUS_DRAFT = 1;
    CASH_PLAN_STATUS_ACTIVE = 2;
    CASH_PLAN_STATUS_EXECUTED = 3;
    CASH_PLAN_STATUS_CLOSED = 4;
}

enum CashTransferStatus {
    CASH_TRANSFER_STATUS_UNSPECIFIED = 0;
    CASH_TRANSFER_STATUS_PENDING = 1;
    CASH_TRANSFER_STATUS_APPROVED = 2;
    CASH_TRANSFER_STATUS_EXECUTED = 3;
    CASH_TRANSFER_STATUS_REJECTED = 4;
    CASH_TRANSFER_STATUS_CANCELLED = 5;
}

message BudgetLineProto {
    int64 id = 1;
    int64 budgetId = 2;
    string subjectCode = 3;
    string subjectName = 4;
    google.type.Money budgetAmount = 5;
    google.type.Money usedAmount = 6;
    google.type.Money adjustedAmount = 7;
}
message BudgetProto {
    int64 id = 1;
    string budgetCode = 2;
    string budgetName = 3;
    BudgetType type = 4;
    string period = 5;
    int64 departmentId = 6;
    string departmentName = 7;
    BudgetStatus status = 8;
    google.type.Money totalAmount = 9;
    google.type.Money usedAmount = 10;
    google.type.Money adjustedAmount = 11;
    string currency = 12;
    string remark = 13;
    int64 createdAt = 14;
    int64 updatedAt = 15;
    repeated BudgetLineProto lines = 16;
}

message GetBudgetRequest { int64 id = 1; }
message GetBudgetResponse { BudgetProto budget = 1; }
message ListBudgetsRequest {
    BudgetStatus status = 1;
    BudgetType type = 2;
    int64 departmentId = 3;
    int32 page = 4;
    int32 size = 5;
}
message ListBudgetsResponse {
    repeated BudgetProto budgets = 1;
    int32 totalCount = 2;
    int32 page = 3;
    int32 size = 4;
}
message CreateBudgetRequest {
    string budgetCode = 1;
    string budgetName = 2;
    BudgetType type = 3;
    string period = 4;
    int64 departmentId = 5;
    google.type.Money totalAmount = 6;
    string currency = 7;
    string remark = 8;
    repeated BudgetLineProto lines = 9;
}
message CreateBudgetResponse { BudgetProto budget = 1; }
message UpdateBudgetRequest {
    int64 id = 1;
    string budgetName = 2;
    string remark = 3;
}
message UpdateBudgetResponse { BudgetProto budget = 1; }
message DeleteBudgetRequest { int64 id = 1; }
message DeleteBudgetResponse { bool success = 1; }
message AdjustBudgetRequest {
    int64 budgetId = 1;
    string adjustmentNo = 2;
    BudgetType type = 3;
    string subjectCode = 4;
    google.type.Money amount = 5;
    string reason = 6;
}
message AdjustBudgetResponse { bool success = 1; }

message BankAccountProto {
    int64 id = 1;
    string accountCode = 2;
    string accountName = 3;
    string bankName = 4;
    string accountNumber = 5;
    string accountType = 6;
    BankAccountStatus status = 7;
    google.type.Money balance = 8;
    google.type.Money frozenAmount = 9;
    string currency = 10;
    string remark = 11;
    int64 createdAt = 12;
    int64 updatedAt = 13;
}

message GetBankAccountRequest { int64 id = 1; }
message GetBankAccountResponse { BankAccountProto bankAccount = 1; }
message ListBankAccountsRequest {
    BankAccountStatus status = 1;
    int32 page = 2;
    int32 size = 3;
}
message ListBankAccountsResponse {
    repeated BankAccountProto bankAccounts = 1;
    int32 totalCount = 2;
    int32 page = 3;
    int32 size = 4;
}
message CreateBankAccountRequest {
    string accountCode = 1;
    string accountName = 2;
    string bankName = 3;
    string accountNumber = 4;
    string currency = 5;
}
message CreateBankAccountResponse { BankAccountProto bankAccount = 1; }
message UpdateBankAccountRequest {
    int64 id = 1;
    string accountName = 2;
    BankAccountStatus status = 3;
}
message UpdateBankAccountResponse { BankAccountProto bankAccount = 1; }

message CashPlanLineProto {
    int64 id = 1;
    int64 cashPlanId = 2;
    string categoryCode = 3;
    string categoryName = 4;
    string flowDirection = 5;
    google.type.Money plannedAmount = 6;
    google.type.Money actualAmount = 7;
    int64 plannedDate = 8;
    string remark = 9;
}
message CashPlanProto {
    int64 id = 1;
    string planCode = 2;
    string planName = 3;
    string type = 4;
    string period = 5;
    int64 startDate = 6;
    int64 endDate = 7;
    CashPlanStatus status = 8;
    google.type.Money totalAmount = 9;
    google.type.Money inflowAmount = 10;
    google.type.Money outflowAmount = 11;
    string currency = 12;
    int64 departmentId = 13;
    string departmentName = 14;
    string remark = 15;
    int64 createdAt = 16;
    int64 updatedAt = 17;
    repeated CashPlanLineProto lines = 18;
}
message GetCashPlanRequest { int64 id = 1; }
message GetCashPlanResponse { CashPlanProto cashPlan = 1; }
message ListCashPlansRequest {
    CashPlanStatus status = 1;
    string type = 2;
    int32 page = 3;
    int32 size = 4;
}
message ListCashPlansResponse {
    repeated CashPlanProto cashPlans = 1;
    int32 totalCount = 2;
    int32 page = 3;
    int32 size = 4;
}
message CreateCashPlanRequest {
    string planCode = 1;
    string planName = 2;
    string type = 3;
    int64 startDate = 4;
    int64 endDate = 5;
    google.type.Money totalAmount = 6;
    int64 departmentId = 7;
    repeated CashPlanLineProto lines = 8;
}
message CreateCashPlanResponse { CashPlanProto cashPlan = 1; }

message CashTransferProto {
    int64 id = 1;
    string transferNo = 2;
    int64 fromAccountId = 3;
    string fromAccountName = 4;
    int64 toAccountId = 5;
    string toAccountName = 6;
    google.type.Money amount = 7;
    string currency = 8;
    CashTransferStatus status = 9;
    string type = 10;
    string purpose = 11;
    int64 transferDate = 12;
    string remark = 13;
    int64 createdAt = 14;
    int64 updatedAt = 15;
}
message CreateCashTransferRequest {
    int64 fromAccountId = 1;
    int64 toAccountId = 2;
    google.type.Money amount = 3;
    string currency = 4;
    string type = 5;
    string purpose = 6;
}
message CreateCashTransferResponse { CashTransferProto transfer = 1; }
message ApproveCashTransferRequest {
    int64 id = 1;
    string approvedBy = 2;
}
message ApproveCashTransferResponse { bool success = 1; }
message ExecuteCashTransferRequest { int64 id = 1; }
message ExecuteCashTransferResponse { bool success = 1; }
