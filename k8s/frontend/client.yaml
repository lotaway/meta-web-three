apiVersion: apps/v1
kind: Deployment
metadata:
  name: digital-twin-frontend
  namespace: meta-web-three
  labels:
    app: digital-twin-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: digital-twin-frontend
  template:
    metadata:
      labels:
        app: digital-twin-frontend
    spec:
      containers:
      - name: digital-twin-frontend
        image: meta-web-three/digital-twin-frontend:latest
        ports:
        - containerPort: 3000
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: digital-twin-frontend-service
  namespace: meta-web-three
  labels:
    app: digital-twin-frontend
spec:
  selector:
    app: digital-twin-frontend
  ports:
  - port: 3000
    targetPort: 3000
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: digital-twin-frontend-ingress
  namespace: meta-web-three
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
spec:
  rules:
  - host: meta-web-three.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: digital-twin-frontend-service
            port:
              number: 3000 