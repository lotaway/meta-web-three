apiVersion: apps/v1
kind: Deployment
metadata:
  name: digital-twin-service
  namespace: meta-web-three
  labels:
    app: digital-twin-service
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: digital-twin-service
  template:
    metadata:
      labels:
        app: digital-twin-service
        tier: backend
    spec:
      containers:
        - name: digital-twin-service
          image: metawebthree/digital-twin-service:1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
            - containerPort: 9090
              name: actuator
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "prod"
            - name: SERVER_PORT
              value: "8080"
            - name: JAVA_OPTS
              value: "-Xms512m -Xmx1024m -XX:+UseG1GC"
            # Sensitive data injected via SealedSecret/External Secrets Operator
            # Uncomment and apply SealedSecret to activate:
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: digital-twin-secrets
                  key: database-password
                  optional: true
            - name: SPRING_REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: digital-twin-secrets
                  key: redis-password
                  optional: true
            - name: SPRING_KAFKA_PROPERTIES_SASL_JAAS_CONFIG
              valueFrom:
                secretKeyRef:
                  name: digital-twin-secrets
                  key: kafka-sasl-config
                  optional: true
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 9090
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 9090
            initialDelaySeconds: 30
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: digital-twin-service
                topologyKey: kubernetes.io/hostname