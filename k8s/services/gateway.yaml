apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: meta-web-three
  labels:
    app: gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      initContainers:
        - name: wait-for-zookeeper
          image: busybox:1.35
          command:
            [
              "sh",
              "-c",
              "until nc -z zookeeper-service 2181; do echo waiting for zookeeper; sleep 2; done;",
            ]
      containers:
        - name: gateway
          image: meta-web-three/gateway:latest
          ports:
            - containerPort: 10081
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "dev"
            - name: SERVER_PORT
              value: "10081"
          volumeMounts:
            - name: app-config
              mountPath: /app/config
            - name: gateway-data
              mountPath: /server/gateway
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 10081
            initialDelaySeconds: 60
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 10081
            initialDelaySeconds: 30
            periodSeconds: 10
      volumes:
        - name: app-config
          configMap:
            name: app-config
        - name: gateway-data
          persistentVolumeClaim:
            claimName: gateway-data-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: gateway-data-pvc
  namespace: meta-web-three
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-storage
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: gateway-service
  namespace: meta-web-three
  labels:
    app: gateway
spec:
  selector:
    app: gateway
  ports:
    - port: 10081
      targetPort: 10081
  type: LoadBalancer
