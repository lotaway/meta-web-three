owner_domain: mall-domain
description: 商城域 - 商品、订单、购物车、促销、支付、用户
services:
  product-service:
    allowed_tables:
      - products
      - product_sku
      - product_category
      - product_specs
      - product_images
    readonly_tables:
      - orders
      - inventory
  
  order-service:
    allowed_tables:
      - orders
      - order_items
      - order_logs
      - order_addresses
    readonly_tables:
      - products
      - inventory
  
  cart-service:
    allowed_tables:
      - carts
      - cart_items
    readonly_tables:
      - products
  
  promotion-service:
    allowed_tables:
      - promotions
      - coupons
      - coupon_users
      - promotion_rules
    readonly_tables:
      - orders
  
  payment-service:
    allowed_tables:
      - payments
      - refunds
      - payment_methods
    readonly_tables:
      - orders
  
  user-service:
    allowed_tables:
      - users
      - addresses
      - auth_tokens
      - user_profiles